syntax = "proto3";

package chainguard.platform.libraries.v2beta1;

import "annotations/auth.proto";
import "annotations/mcp.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";

option go_package = "chainguard.dev/sdk/proto/chainguard/platform/libraries/v2beta1";
option java_multiple_files = true;
option java_outer_classname = "ArtifactsProto";
option java_package = "com.chainguard.platform.libraries.v2beta1";

// ArtifactsService provides access to Chainguard Libraries artifact metadata.
service ArtifactsService {
  // ListArtifacts returns artifacts based on filter criteria with pagination support.
  rpc ListArtifacts(ListArtifactsRequest) returns (ListArtifactsResponse) {
    option (google.api.http) = {get: "/libraries/v2beta1/artifacts"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_LIBRARIES_ARTIFACTS_LIST]
        unscoped: true
      }
    };
    option (chainguard.annotations.mcp) = {
      description: "List software artifacts from Chainguard Libraries. Supports filtering by ecosystem, query string, and pagination."
      read_only: true
      idempotent: true

    };
  }

  // ListArtifactVersions returns all versions of a specific artifact with pagination support.
  rpc ListArtifactVersions(ListArtifactVersionsRequest) returns (ListArtifactVersionsResponse) {
    option (google.api.http) = {get: "/libraries/v2beta1/artifacts/{artifact_id=*}/versions"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_LIBRARIES_ARTIFACTS_LIST]
        unscoped: true
      }
    };
    option (chainguard.annotations.mcp) = {
      description: "List all versions of a specific artifact from Chainguard Libraries with pagination support."
      read_only: true
      idempotent: true

    };
  }

  // GetArtifactCount returns the total number of artifacts for specified ecosystems.
  rpc GetArtifactCount(GetArtifactCountRequest) returns (GetArtifactCountResponse) {
    option (google.api.http) = {get: "/libraries/v2beta1/artifacts/count"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_LIBRARIES_ARTIFACTS_LIST]
        unscoped: true
      }
    };
    option (chainguard.annotations.mcp) = {
      description: "Get the total count of artifacts for specified language ecosystems."
      read_only: true
      idempotent: true

    };
  }
}

// Artifact contains metadata about a software artifact in a language ecosystem.
message Artifact {
  option (google.api.resource) = {
    type: "libraries.chainguard.dev/Artifact"
    pattern: "artifacts/{artifact}"
    singular: "artifact"
    plural: "artifacts"
  };

  // Unique identifier for the artifact, based on the ecosystem it belongs to.
  string uid = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The artifact name.
  string name = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The description of the most recent version of this artifact.
  string description = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The language ecosystem this artifact belongs to.
  Ecosystem ecosystem = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The most recent version of this artifact available.
  string latest_version = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The number of versions available for this artifact.
  int32 version_count = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the first version was published to Chainguard Libraries.
  google.protobuf.Timestamp create_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the most recent version was published to Chainguard Libraries.
  google.protobuf.Timestamp update_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// ArtifactVersion contains metadata about a specific version of an artifact.
message ArtifactVersion {
  option (google.api.resource) = {
    type: "libraries.chainguard.dev/ArtifactVersion"
    pattern: "artifacts/{artifact}/versions/{version}"
    singular: "artifactVersion"
    plural: "artifactVersions"
  };

  // Unique identifier for this version of the artifact.
  string uid = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The name of the artifact.
  string name = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The version string of this artifact.
  string version = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // A long form description of this version of the artifact.
  string description = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When this version was first published to Chainguard Libraries.
  google.protobuf.Timestamp create_time = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When this version was last published to Chainguard Libraries.
  google.protobuf.Timestamp update_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The estimated size of this artifact in bytes.
  int64 size_bytes = 7 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// ListArtifactsRequest is the request message for ListArtifacts.
message ListArtifactsRequest {
  // The language ecosystems to return artifacts for.
  repeated Ecosystem ecosystems = 1 [(google.api.field_behavior) = REQUIRED];

  // A string to search artifacts by. If empty, all artifacts
  // from the given ecosystem will be returned.
  string query = 2 [(google.api.field_behavior) = OPTIONAL];

  // Specify the CUDA version of the packages to return from the Python ecosystem.
  optional string cuda_version = 3 [(google.api.field_behavior) = OPTIONAL];

  // Flag to return only remediated packages for the ecosystems.
  bool remediated = 4 [(google.api.field_behavior) = OPTIONAL];

  // Maximum number of artifacts to return per page.
  // Default: 50, Maximum: 200.
  int32 page_size = 10 [(google.api.field_behavior) = OPTIONAL];

  // Page token from a previous ListArtifacts response for pagination.
  // Opaque token with 3-day expiration.
  string page_token = 11 [(google.api.field_behavior) = OPTIONAL];

  // Number of results to skip before returning.
  // Used for random-access pagination (jumping to arbitrary pages).
  // Can be combined with page_token to skip from cursor position.
  // Must be non-negative.
  int32 skip = 12 [(google.api.field_behavior) = OPTIONAL];

  // Order results by field. Format: "field [asc|desc]"
  // Default: name ascending.
  // Note: Changing order_by between pages invalidates the page_token.
  string order_by = 13 [(google.api.field_behavior) = OPTIONAL];
}

// ListArtifactsResponse is the response message for ListArtifacts.
message ListArtifactsResponse {
  // Artifacts matching the filter criteria.
  repeated Artifact artifacts = 1;

  // Token for retrieving the next page of results.
  // Empty if no more results.
  string next_page_token = 2;

  // Total number of artifacts matching the filter.
  // Provided for UI pagination.
  int64 total_count = 3;

  // Number of results that were skipped.
  // Accumulates across paginated requests.
  int32 skipped = 4;
}

// ListArtifactVersionsRequest is the request message for ListArtifactVersions.
message ListArtifactVersionsRequest {
  // The artifact's unique identifier, as returned by ListArtifacts.
  string artifact_id = 1 [(google.api.field_behavior) = REQUIRED];

  // Maximum number of versions to return per page.
  // Default: 50, Maximum: 200.
  int32 page_size = 10 [(google.api.field_behavior) = OPTIONAL];

  // Page token from a previous ListArtifactVersions response for pagination.
  // Opaque token with 3-day expiration.
  string page_token = 11 [(google.api.field_behavior) = OPTIONAL];

  // Number of results to skip before returning.
  // Used for random-access pagination (jumping to arbitrary pages).
  // Can be combined with page_token to skip from cursor position.
  // Must be non-negative.
  int32 skip = 12 [(google.api.field_behavior) = OPTIONAL];

  // Order results by field. Format: "field [asc|desc]"
  // Default: "version desc" (newest first)
  // Note: Changing order_by between pages invalidates the page_token.
  string order_by = 13 [(google.api.field_behavior) = OPTIONAL];
}

// ListArtifactVersionsResponse is the response message for ListArtifactVersions.
message ListArtifactVersionsResponse {
  // Versions of the artifact.
  repeated ArtifactVersion artifact_versions = 1;

  // Token for retrieving the next page of results.
  // Empty if no more results.
  string next_page_token = 2;

  // Total number of versions for this artifact.
  // Provided for UI pagination.
  int64 total_count = 3;

  // Number of results that were skipped.
  // Accumulates across paginated requests.
  int32 skipped = 4;
}

// GetArtifactCountRequest is the request message for GetArtifactCount.
message GetArtifactCountRequest {
  // The language ecosystems to request the artifact counts for.
  repeated Ecosystem ecosystems = 1 [(google.api.field_behavior) = REQUIRED];
}

// GetArtifactCountResponse is the response message for GetArtifactCount.
message GetArtifactCountResponse {
  // EcosystemCount represents the total number of artifacts for a given ecosystem.
  message EcosystemCount {
    // The ecosystem.
    Ecosystem ecosystem = 1;

    // Total number of artifacts for this ecosystem.
    int64 total_count = 2;
  }

  // Counts for each requested ecosystem.
  repeated EcosystemCount counts = 1;
}

// Ecosystem represents the language ecosystem an artifact belongs to.
enum Ecosystem {
  // Unspecified ecosystem.
  ECOSYSTEM_UNSPECIFIED = 0;

  // Java ecosystem (Maven).
  ECOSYSTEM_JAVA = 1;

  // Python ecosystem (PyPI).
  ECOSYSTEM_PYTHON = 2;
}
