syntax = "proto3";

package chainguard.platform.iam.v2beta1;

import "annotations/auth.proto";
import "annotations/events.proto";
import "annotations/mcp.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "platform/common/v1/uidp.platform.proto";

option go_package = "chainguard.dev/sdk/proto/chainguard/platform/iam/v2beta1";
option java_multiple_files = true;
option java_outer_classname = "IdentitiesProto";
option java_package = "com.chainguard.platform.iam.v2beta1";

// IdentitiesService manages IAM identities.
service IdentitiesService {
  // CreateIdentity creates a new identity under a parent group.
  rpc CreateIdentity(CreateIdentityRequest) returns (Identity) {
    option (google.api.http) = {
      post: "/iam/v2beta1/identities/{parent=**}"
      body: "identity"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_IDENTITY_CREATE]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.iam.identity.created.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
    option (chainguard.annotations.mcp) = {
      description: "Create a new IAM identity (OIDC claim match, static keys, AWS IAM, or service principal) under a group."
      read_only: false
      destructive: false
      idempotent: false
      open_world: false
    };
  }

  // GetIdentity retrieves a single identity by UID.
  rpc GetIdentity(GetIdentityRequest) returns (Identity) {
    option (google.api.http) = {get: "/iam/v2beta1/identities/{uid=**}"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_IDENTITY_LIST]
      }
    };
    option (chainguard.annotations.mcp) = {
      description: "Get an IAM identity by its UIDP."
      read_only: true
      destructive: false
      idempotent: true
      open_world: false
    };
  }

  // DeleteIdentity deletes an identity by UID.
  rpc DeleteIdentity(DeleteIdentityRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/iam/v2beta1/identities/{uid=**}"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_IDENTITY_DELETE]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.iam.identity.deleted.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
    option (chainguard.annotations.mcp) = {
      description: "Delete an IAM identity by its UIDP."
      read_only: false
      destructive: true
      idempotent: true
      open_world: false
    };
  }

  // UpdateIdentity updates the given Identity according to the provided field mask.
  // The fully populated Identity is returned.
  rpc UpdateIdentity(UpdateIdentityRequest) returns (Identity) {
    option (google.api.http) = {
      patch: "/iam/v2beta1/identities/{identity.uid=**}"
      body: "identity"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_IDENTITY_UPDATE]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.iam.identity.updated.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
    option (chainguard.annotations.mcp) = {
      description: "Update an IAM identity's name, description, or relationship configuration."
      read_only: false
      destructive: false
      idempotent: true
      open_world: false
    };
  }

  // ListIdentities returns identities based on filter criteria with pagination support.
  rpc ListIdentities(ListIdentitiesRequest) returns (ListIdentitiesResponse) {
    option (google.api.http) = {get: "/iam/v2beta1/identities"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_IDENTITY_LIST]
        unscoped: true
      }
    };
    option (chainguard.annotations.mcp) = {
      description: "List IAM identities the caller has access to. Supports filtering by name, relationship type, and pagination."
      read_only: true
      destructive: false
      idempotent: true
      open_world: false
    };
  }

  // LookupIdentity resolves an OIDC issuer and subject to a Chainguard
  // identity UID. If no identity exists yet, returns the deterministic UID
  // the identity will receive upon registration — enabling role bindings
  // to be created before the user signs up.
  //
  // This is an unscoped endpoint: any authenticated caller may invoke it.
  rpc LookupIdentity(LookupIdentityRequest) returns (LookupIdentityResponse) {
    option (google.api.http) = {get: "/iam/v2beta1/identities:lookupIdentity"};
    option (chainguard.annotations.iam) = {
      enabled: {unscoped: true}
    };
    option (chainguard.annotations.mcp) = {hidden: true};
  }

  // UpdateIdentityMetadata updates metadata fields on the caller's own
  // identity. The identity is derived from the caller's token — no UID
  // parameter is needed.
  //
  // This is an unscoped endpoint: any authenticated caller may invoke it.
  // Follows AIP-134: supports field mask for partial updates.
  rpc UpdateIdentityMetadata(UpdateIdentityMetadataRequest) returns (IdentityMetadata) {
    option (google.api.http) = {
      patch: "/iam/v2beta1/identities:updateIdentityMetadata"
      body: "*"
    };
    option (chainguard.annotations.iam) = {
      enabled: {unscoped: true}
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.iam.identity.metadata.updated.v1"
      audience: INTERNAL
    };
    option (chainguard.annotations.mcp) = {hidden: true};
  }
}

// Identity represents an IAM identity.
message Identity {
  option (google.api.resource) = {
    type: "iam.chainguard.dev/Identity"
    pattern: "identities/{identity}"
    singular: "identity"
    plural: "identities"
  };

  // Unique identifier for the identity (UIDP).
  // Generated by server.
  string uid = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (chainguard.annotations.iam_scope) = true
  ];

  // Human-readable name of the identity.
  // Must be 3-63 characters.
  string name = 2 [(google.api.field_behavior) = REQUIRED];

  // Optional description of the identity.
  string description = 3 [(google.api.field_behavior) = OPTIONAL];

  // Verified email address from OIDC token (email_verified = true).
  string email = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Unverified email address from OIDC token (email_verified = false).
  string email_unverified = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional company associated with the identity.
  string company = 6 [(google.api.field_behavior) = OPTIONAL];

  reserved 7;
  reserved "providers";

  // When the identity was last federated (last login).
  google.protobuf.Timestamp last_seen_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the identity was created.
  google.protobuf.Timestamp create_time = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the identity was last updated.
  google.protobuf.Timestamp update_time = 10 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The relationship configuration for this identity.
  // Exactly one must be set.
  oneof relationship {
    // OIDC claim matching configuration.
    ClaimMatch claim_match = 20;

    // Static OIDC keys configuration.
    StaticKeys static_keys = 21;

    // AWS IAM identity configuration.
    AWSIdentity aws_identity = 22;

    // Chainguard service principal.
    ServicePrincipal service_principal = 23;
  }

  // ClaimMatch checks the third party IdP token's claims against configured patterns.
  message ClaimMatch {
    // Required, matches the `iss` claim.
    oneof iss {
      // Exact issuer to match.
      string issuer = 1;
      // Regular expression for matching the issuer.
      string issuer_pattern = 2;
    }

    // Required, matches the `sub` claim.
    oneof sub {
      // Exact subject to match.
      string subject = 3;
      // Regular expression for matching the subject.
      string subject_pattern = 4;
    }

    // Optional, matches the `aud` claim.
    // When unspecified, defaults to the SaaS environment's issuer hostname.
    oneof aud {
      // Exact audience to match.
      string audience = 5;
      // Regular expression for matching the audience.
      string audience_pattern = 6;
    }

    // Custom claims with exact value matching.
    map<string, string> claims = 7 [(google.api.field_behavior) = OPTIONAL];

    // Custom claims with regex pattern matching.
    map<string, string> claim_patterns = 8 [(google.api.field_behavior) = OPTIONAL];
  }

  // StaticKeys uses pre-registered verification keys for providers without an online issuer.
  // Note: Identities using static keys will expire (maximum 365 days).
  message StaticKeys {
    // Issuer to match against the `iss` claim.
    string issuer = 1 [(google.api.field_behavior) = REQUIRED];

    // Subject to match against the `sub` claim.
    string subject = 2 [(google.api.field_behavior) = REQUIRED];

    // JWKS-formatted public keys for verification.
    string issuer_keys = 3 [(google.api.field_behavior) = REQUIRED];

    // When the issuer_keys expire.
    // Defaults to / Maximum of 365 days after creation.
    google.protobuf.Timestamp expiration_time = 4 [(google.api.field_behavior) = OPTIONAL];

    // Accepted OIDC token audiences for this identity.
    // When set, only these values are checked and the global allowed
    // audiences are bypassed entirely.
    // When empty, falls back to the global allowed audiences.
    // Currently only a single audience is supported — callers must specify
    // exactly one value. The field is repeated for forward compatibility.
    repeated string audiences = 5 [(google.api.field_behavior) = OPTIONAL];
  }

  // AWSIdentity matches AWS IAM users and roles.
  message AWSIdentity {
    // AWS account ID (12 digits).
    string aws_account = 1 [(google.api.field_behavior) = REQUIRED];

    // Matches the `Arn` field from AWS GetCallerIdentity.
    oneof aws_arn {
      // Exact ARN to match.
      string arn = 2;
      // Regular expression for matching the ARN.
      string arn_pattern = 3;
    }

    // Matches the `UserId` field from AWS GetCallerIdentity.
    oneof aws_user_id {
      // Exact user ID to match.
      string user_id = 4;
      // Regular expression for matching the user ID.
      string user_id_pattern = 5;
    }
  }
}

// CreateIdentityRequest is the request message for CreateIdentity.
message CreateIdentityRequest {
  // Parent group UIDP under which the identity will be created.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];

  // The identity to create.
  Identity identity = 2 [(google.api.field_behavior) = REQUIRED];
}

// GetIdentityRequest is the request message for GetIdentity.
message GetIdentityRequest {
  // UID of the identity to retrieve.
  string uid = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];
}

// DeleteIdentityRequest is the request message for DeleteIdentity.
message DeleteIdentityRequest {
  // UID of the identity to delete.
  string uid = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];
}

// UpdateIdentityRequest is the request message for UpdateIdentity.
message UpdateIdentityRequest {
  // The identity to update.
  Identity identity = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];

  // The list of fields to update. If not provided, an implied
  // field mask is used equivalent to all fields that are populated
  // (have non-default values). * is supported and interpreted as a full
  // replacement with the given field values.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];
}

// ListIdentitiesRequest is the request message for ListIdentities.
message ListIdentitiesRequest {
  // Optional UIDP-based filter for hierarchy navigation.
  chainguard.platform.common.UIDPFilter uidp = 1 [(google.api.field_behavior) = OPTIONAL];

  // Optional exact name to filter by.
  string name = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional relationship type to filter by.
  RelationshipType relationship_type = 3 [(google.api.field_behavior) = OPTIONAL];

  // Maximum number of results to return per page.
  // Default: 50, Maximum: 200.
  int32 page_size = 4 [(google.api.field_behavior) = OPTIONAL];

  // Page token from a previous List response for pagination.
  // Opaque token with 3-day expiration.
  string page_token = 5 [(google.api.field_behavior) = OPTIONAL];

  // Order results by field. Format: "field [asc|desc]"
  // Default: "uid asc"
  // Note: Changing order_by between pages invalidates the page token.
  string order_by = 6 [(google.api.field_behavior) = OPTIONAL];

  // Number of results to skip before returning.
  // Used for random-access pagination (jumping to arbitrary pages).
  // Can be combined with page_token to skip from cursor position.
  // Must be non-negative.
  int32 skip = 7 [(google.api.field_behavior) = OPTIONAL];
}

// ListIdentitiesResponse is the response message for ListIdentities.
message ListIdentitiesResponse {
  // Identities matching the filter criteria.
  repeated Identity identities = 1;

  // Token for retrieving the next page of results.
  // Empty if no more results.
  string next_page_token = 2;

  // Total number of identities matching the filter.
  // Optional, provided for UI pagination.
  optional int64 total_count = 3;

  // Number of results that were skipped.
  // Accumulates across paginated requests.
  int32 skipped = 4;
}

// LookupIdentityRequest is the request for LookupIdentity.
message LookupIdentityRequest {
  // The OIDC issuer URL (e.g. "https://accounts.google.com").
  string issuer = 1 [(google.api.field_behavior) = REQUIRED];

  // The OIDC subject identifier.
  string subject = 2 [(google.api.field_behavior) = REQUIRED];
}

// LookupIdentityResponse is the response for LookupIdentity.
message LookupIdentityResponse {
  // The Chainguard identity UID matching the issuer/subject.
  // If no identity exists yet, this is the deterministic UID
  // the identity will receive upon future registration.
  string uid = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// IdentityMetadata contains profile and onboarding metadata for the
// caller's identity. OUTPUT_ONLY fields are populated by the server;
// all other fields are caller-provided and passed through the emitted
// CloudEvent for downstream consumers (e.g. HubSpot sync).
// (-- api-linter: core::0123::resource-annotation=disabled
//     aip.dev/not-precedent: IdentityMetadata is not a standalone resource; it is a
//     value object returned by UpdateIdentityMetadata and emitted as a CloudEvent body. --)
message IdentityMetadata {
  // The caller's identity UID.
  string uid = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The caller's display name (from upstream OIDC token).
  string name = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The caller's given name (derived from display name).
  string given_name = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The caller's family name (derived from display name).
  string family_name = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The company name associated with the identity.
  string company = 5 [(google.api.field_behavior) = OPTIONAL];

  // Whether the user has opted to receive updates from Chainguard.
  // (-- api-linter: core::0140::prepositions=disabled
  //     aip.dev/not-precedent: "opt_in" is a compound term matching the v1 field name. --)
  bool updates_opt_in = 6 [(google.api.field_behavior) = OPTIONAL];

  // The product the user is interested in.
  string product = 7 [(google.api.field_behavior) = OPTIONAL];

  // The user's job title.
  string job_title = 8 [(google.api.field_behavior) = OPTIONAL];

  // UTM campaign tracking parameter.
  string utm_campaign = 9 [(google.api.field_behavior) = OPTIONAL];

  // UTM content tracking parameter.
  string utm_content = 10 [(google.api.field_behavior) = OPTIONAL];

  // UTM medium tracking parameter.
  string utm_medium = 11 [(google.api.field_behavior) = OPTIONAL];

  // UTM source tracking parameter.
  string utm_source = 12 [(google.api.field_behavior) = OPTIONAL];

  // UTM term tracking parameter.
  string utm_term = 13 [(google.api.field_behavior) = OPTIONAL];

  // The URL of the latest form submission.
  string latest_form_submit_url = 14 [(google.api.field_behavior) = OPTIONAL];

  // The URL of the latest internal referring page.
  string latest_internal_referring_url = 15 [(google.api.field_behavior) = OPTIONAL];

  // The HubSpot UTK value to pass to HubSpot during console login.
  // This value is ephemeral and not persisted to datastore.
  string hubspot_utk = 16 [(google.api.field_behavior) = OPTIONAL];

  // Flag to indicate if the user is onboarding via a self-service flow.
  bool self_serve = 17 [(google.api.field_behavior) = OPTIONAL];
}

// UpdateIdentityMetadataRequest is the request for UpdateIdentityMetadata.
message UpdateIdentityMetadataRequest {
  // The metadata to update.
  IdentityMetadata identity_metadata = 1 [(google.api.field_behavior) = REQUIRED];

  // The list of fields to update. If not provided, an implied field mask
  // is used equivalent to all populated fields. * is supported over gRPC
  // and interpreted as a full replacement with the given field values.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];
}

// RelationshipType represents the type of identity relationship.
enum RelationshipType {
  // Unspecified relationship type (matches all).
  RELATIONSHIP_TYPE_UNSPECIFIED = 0;

  // OIDC claim matching.
  RELATIONSHIP_TYPE_CLAIM_MATCH = 1;

  // Static OIDC keys (no online issuer).
  RELATIONSHIP_TYPE_STATIC = 2;

  // AWS IAM identity.
  RELATIONSHIP_TYPE_AWS_IDENTITY = 3;

  // Chainguard service principal.
  RELATIONSHIP_TYPE_SERVICE_PRINCIPAL = 4;
}

// ServicePrincipal represents a Chainguard service that can assume an identity.
enum ServicePrincipal {
  // Unknown/unspecified service principal.
  SERVICE_PRINCIPAL_UNSPECIFIED = 0;

  // Cosigned service for image signing.
  SERVICE_PRINCIPAL_COSIGNED = 1;
  // Ingester service for data ingestion.
  SERVICE_PRINCIPAL_INGESTER = 2;
  // Catalog syncer service for synchronizing image catalogs.
  SERVICE_PRINCIPAL_CATALOG_SYNCER = 3;
  // APKO builder service for building images.
  SERVICE_PRINCIPAL_APKO_BUILDER = 4;
  // Entitlement syncer service for synchronizing entitlements.
  SERVICE_PRINCIPAL_ENTITLEMENT_SYNCER = 5;
  // Tenant scanner service for scanning tenant resources.
  SERVICE_PRINCIPAL_TENANT_SCANNER = 6;
  // Sedimentology service for data analysis.
  SERVICE_PRINCIPAL_SEDIMENTOLOGY = 7;
  // Skillup service for fixing repository skill violations.
  SERVICE_PRINCIPAL_SKILLUP = 8;
  // Materializer service for materializing solutions from problem statements.
  SERVICE_PRINCIPAL_MATERIALIZER = 9;
  // Microflow service for running a pull request's committed CI workflows in microVMs.
  SERVICE_PRINCIPAL_MICROFLOW = 10;
}
