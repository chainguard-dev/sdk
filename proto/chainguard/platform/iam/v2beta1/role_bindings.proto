syntax = "proto3";

package chainguard.platform.iam.v2beta1;

import "annotations/auth.proto";
import "annotations/events.proto";
import "annotations/mcp.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "platform/common/v1/uidp.platform.proto";

option go_package = "chainguard.dev/sdk/proto/chainguard/platform/iam/v2beta1";
option java_multiple_files = true;
option java_outer_classname = "RoleBindingsProto";
option java_package = "com.chainguard.platform.iam.v2beta1";

// RoleBindingsService manages IAM role bindings.
// Role bindings associate an identity with a role within a group scope.
service RoleBindingsService {
  // GetRoleBinding retrieves a single role binding by UID.
  rpc GetRoleBinding(GetRoleBindingRequest) returns (RoleBinding) {
    option (google.api.http) = {get: "/iam/v2beta1/roleBindings/{uid=**}"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_ROLE_BINDINGS_LIST]
      }
    };
    option (chainguard.annotations.mcp) = {
      description: "Get an IAM role binding by its UIDP."
      read_only: true
      destructive: false
      idempotent: true
      open_world: false
    };
  }

  // CreateRoleBinding creates a new role binding.
  // Associates an identity with a role within a group scope.
  rpc CreateRoleBinding(CreateRoleBindingRequest) returns (RoleBinding) {
    option (google.api.http) = {
      post: "/iam/v2beta1/roleBindings/{parent=**}"
      body: "role_binding"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_ROLE_BINDINGS_CREATE]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.iam.rolebindings.created.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
    option (chainguard.annotations.mcp) = {
      description: "Create a new IAM role binding, granting an identity a role within a group scope."
      read_only: false
      destructive: false
      idempotent: false
      open_world: false
    };
  }

  // DeleteRoleBinding deletes a role binding by UID.
  // Idempotent: returns success if the role binding does not exist (AIP-135).
  rpc DeleteRoleBinding(DeleteRoleBindingRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/iam/v2beta1/roleBindings/{uid=**}"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_ROLE_BINDINGS_DELETE]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.iam.rolebindings.deleted.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
    option (chainguard.annotations.mcp) = {
      description: "Delete an IAM role binding by its UIDP, revoking the identity's role within the group."
      read_only: false
      destructive: true
      idempotent: true
      open_world: false
    };
  }

  // ListRoleBindings returns role bindings based on filter criteria with pagination support.
  rpc ListRoleBindings(ListRoleBindingsRequest) returns (ListRoleBindingsResponse) {
    option (google.api.http) = {get: "/iam/v2beta1/roleBindings"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_ROLE_BINDINGS_LIST]
        unscoped: true
      }
    };
    option (chainguard.annotations.mcp) = {
      description: "List IAM role bindings the caller has access to. Supports filtering by identity, group, role, and pagination."
      read_only: true
      destructive: false
      idempotent: true
      open_world: false
    };
  }

  // UpdateRoleBinding updates the given role binding according to the provided field mask.
  // The fully populated RoleBinding is returned.
  rpc UpdateRoleBinding(UpdateRoleBindingRequest) returns (RoleBinding) {
    option (google.api.http) = {
      patch: "/iam/v2beta1/roleBindings/{role_binding.uid=**}"
      body: "role_binding"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_ROLE_BINDINGS_UPDATE]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.iam.rolebindings.updated.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
    option (chainguard.annotations.mcp) = {
      description: "Update an IAM role binding's identity or role assignment."
      read_only: false
      destructive: false
      idempotent: true
      open_world: false
    };
  }
}

// RoleBinding represents an IAM role binding.
// A role binding associates an identity with a role within a group scope.
message RoleBinding {
  option (google.api.resource) = {
    type: "iam.chainguard.dev/RoleBinding"
    pattern: "roleBindings/{role_binding}"
    singular: "roleBinding"
    plural: "roleBindings"
  };

  // Unique identifier for the role binding (UIDP).
  // Generated by server.
  string uid = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (chainguard.annotations.iam_scope) = true
  ];

  // The identity that is granted the role.
  // Fully hydrated with identity details.
  RoleBindingIdentity identity = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The group where this role binding applies.
  // Fully hydrated with group details.
  RoleBindingGroup group = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The role that is granted to the identity.
  // Fully hydrated with role details.
  RoleBindingRole role = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the role binding was created.
  google.protobuf.Timestamp create_time = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The identity UID to bind to the role.
  // Set this field when creating or updating a role binding.
  string identity_uid = 6 [(google.api.field_behavior) = OPTIONAL];

  // The role UID to bind to the identity.
  // Set this field when creating or updating a role binding.
  string role_uid = 7 [(google.api.field_behavior) = OPTIONAL];
}

// RoleBindingIdentity contains identity details for a role binding.
// This is a simplified view of Identity for role binding display.
message RoleBindingIdentity {
  // Unique identifier for the identity.
  string uid = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Human-readable name of the identity.
  string name = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional description of the identity.
  string description = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // OIDC subject claim (from ClaimMatch).
  string subject = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // OIDC issuer claim (from ClaimMatch).
  string issuer = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Verified email address.
  string email = 6 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// RoleBindingGroup contains group details for a role binding.
// This is a simplified view of Group for role binding display.
message RoleBindingGroup {
  // Unique identifier for the group.
  string uid = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Human-readable name of the group.
  string name = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional description of the group.
  string description = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// RoleBindingRole contains role details for a role binding.
// This is a simplified view of Role for role binding display.
message RoleBindingRole {
  // Unique identifier for the role.
  string uid = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Human-readable name of the role.
  string name = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional description of the role.
  string description = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// CreateRoleBindingRequest is the request message for CreateRoleBinding.
message CreateRoleBindingRequest {
  // Parent group UIDP where the role binding will be created.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];

  // The role binding to create.
  // Set identity_uid and role_uid; other fields are ignored.
  RoleBinding role_binding = 2 [(google.api.field_behavior) = REQUIRED];
}

// DeleteRoleBindingRequest is the request message for DeleteRoleBinding.
message DeleteRoleBindingRequest {
  // UID of the role binding to delete.
  string uid = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];
}

// GetRoleBindingRequest is the request message for GetRoleBinding.
message GetRoleBindingRequest {
  // UID of the role binding to retrieve.
  string uid = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];
}

// ListRoleBindingsRequest is the request message for ListRoleBindings.
message ListRoleBindingsRequest {
  // Optional UIDP-based filter for hierarchy navigation.
  chainguard.platform.common.UIDPFilter uidp = 1 [(google.api.field_behavior) = OPTIONAL];

  // Optional identity UID to filter by.
  string identity = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional group UIDP to filter by.
  string group = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional role UIDP to filter by.
  string role = 4 [(google.api.field_behavior) = OPTIONAL];

  // Maximum number of results to return per page.
  // Default: 50, Maximum: 200.
  int32 page_size = 5 [(google.api.field_behavior) = OPTIONAL];

  // Page token from a previous List response for pagination.
  // Opaque token with 3-day expiration.
  string page_token = 6 [(google.api.field_behavior) = OPTIONAL];

  // Order results by field. Format: "field [asc|desc]"
  // Default: "uid asc"
  // Note: Changing order_by between pages invalidates the page token.
  string order_by = 7 [(google.api.field_behavior) = OPTIONAL];

  // Number of results to skip before returning.
  // Used for random-access pagination (jumping to arbitrary pages).
  // Can be combined with page_token to skip from cursor position.
  // Must be non-negative.
  int32 skip = 8 [(google.api.field_behavior) = OPTIONAL];
}

// ListRoleBindingsResponse is the response message for ListRoleBindings.
message ListRoleBindingsResponse {
  // Role bindings matching the filter criteria.
  repeated RoleBinding role_bindings = 1;

  // Token for retrieving the next page of results.
  // Empty if no more results.
  string next_page_token = 2;

  // Total number of role bindings matching the filter.
  // Optional, provided for UI pagination.
  optional int64 total_count = 3;

  // Number of results that were skipped.
  // Accumulates across paginated requests.
  int32 skipped = 4;
}

// UpdateRoleBindingRequest is the request message for UpdateRoleBinding.
message UpdateRoleBindingRequest {
  // The role binding to update. Must include uid.
  // Set identity_uid and/or role_uid to update those fields.
  RoleBinding role_binding = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];

  // The list of fields to update. If not provided, an implied
  // field mask is used equivalent to all fields that are populated
  // (have non-default values). * is supported and interpreted as a full
  // replacement with the given field values.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];
}
