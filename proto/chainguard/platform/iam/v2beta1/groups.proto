syntax = "proto3";

package chainguard.platform.iam.v2beta1;

import "annotations/auth.proto";
import "annotations/events.proto";
import "annotations/mcp.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "platform/common/v1/uidp.platform.proto";

option go_package = "chainguard.dev/sdk/proto/chainguard/platform/iam/v2beta1";
option java_multiple_files = true;
option java_outer_classname = "GroupsProto";
option java_package = "com.chainguard.platform.iam.v2beta1";

// GroupsService manages IAM groups (organizations and folders).
service GroupsService {
  // GetGroup retrieves a single group by UID.
  rpc GetGroup(GetGroupRequest) returns (Group) {
    option (google.api.http) = {get: "/iam/v2beta1/groups/{uid=**}"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_GROUPS_LIST]
      }
    };
    option (chainguard.annotations.mcp) = {
      description: "Get a group (organization or folder) by its UIDP."
      read_only: true
      destructive: false
      idempotent: true
      open_world: false
    };
  }

  // DeleteGroup deletes a group by UID.
  // Fails if the group has child repos, child groups, or other child IAM resources.
  rpc DeleteGroup(DeleteGroupRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/iam/v2beta1/groups/{uid=**}"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_GROUPS_DELETE]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.iam.group.deleted.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
  }

  // ListGroups returns groups based on filter criteria with pagination support.
  rpc ListGroups(ListGroupsRequest) returns (ListGroupsResponse) {
    option (google.api.http) = {get: "/iam/v2beta1/groups"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_GROUPS_LIST]
        unscoped: true
      }
    };
    option (chainguard.annotations.mcp) = {description: "List groups (organizations and folders) the caller has access to. Supports filtering and pagination."};
  }

  // CreateGroup creates a new group (organization or folder).
  rpc CreateGroup(CreateGroupRequest) returns (Group) {
    option (google.api.http) = {
      post: "/iam/v2beta1/groups/{parent=**}"
      body: "group"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_GROUPS_CREATE]
        unscoped: true
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.iam.group.created.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
  }

  // UpdateGroup updates the given Group according to the provided field mask.
  // The fully populated Group is returned.
  rpc UpdateGroup(UpdateGroupRequest) returns (Group) {
    option (google.api.http) = {
      patch: "/iam/v2beta1/groups/{group.uid=**}"
      body: "group"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_GROUPS_UPDATE]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.iam.group.updated.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
  }
}

// Group represents an IAM group (organization or folder).
message Group {
  option (google.api.resource) = {
    type: "iam.chainguard.dev/Group"
    pattern: "groups/{group}"
    singular: "group"
    plural: "groups"
  };

  // Unique identifier for the group (UIDP).
  // Generated by server.
  string uid = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (chainguard.annotations.iam_scope) = true
  ];

  // Human-readable name of the group.
  // Must be 3-63 characters.
  string name = 2 [(google.api.field_behavior) = REQUIRED];

  // Optional description of the group's purpose.
  string description = 3 [(google.api.field_behavior) = OPTIONAL];

  // Resource limits indicating the maximum number of resources allowed
  // for this group by type.
  map<string, int32> resource_limits = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Whether this organization is verified by Chainguard.
  // Can only be set by Chainguard staff.
  bool verified = 5 [(google.api.field_behavior) = OPTIONAL];

  // When the group was created.
  google.protobuf.Timestamp create_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the group was last updated.
  google.protobuf.Timestamp update_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The organization kind. Required when creating a verified root group.
  // For subgroups, kind is inherited from the root group and cannot be set.
  OrgKind kind = 8 [(google.api.field_behavior) = OPTIONAL];

  // The provisioning status of the organization. Subgroups inherit the
  // status from the root group they are a descendant of.
  OrgStatus status = 9 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// GetGroupRequest is the request message for GetGroup.
message GetGroupRequest {
  // UID of the group to retrieve.
  string uid = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];
}

// DeleteGroupRequest is the request message for DeleteGroup.
message DeleteGroupRequest {
  // UID of the group to delete.
  string uid = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];
}

// ListGroupsRequest is the request message for ListGroups.
message ListGroupsRequest {
  // Optional UIDP-based filter for hierarchy navigation.
  chainguard.platform.common.UIDPFilter uidp = 1 [(google.api.field_behavior) = OPTIONAL];

  // Optional exact name to filter by.
  string name = 2 [(google.api.field_behavior) = OPTIONAL];

  // Maximum number of results to return per page.
  // Default: 50, Maximum: 200.
  int32 page_size = 3 [(google.api.field_behavior) = OPTIONAL];

  // Page token from a previous List response for pagination.
  // Opaque token with 3-day expiration.
  string page_token = 4 [(google.api.field_behavior) = OPTIONAL];

  // Order results by field. Format: "field [asc|desc]"
  // Default: "uid asc"
  // Note: Changing order_by between pages invalidates the page token.
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];

  // Number of results to skip before returning.
  // Used for random-access pagination (jumping to arbitrary pages).
  // Can be combined with page_token to skip from cursor position.
  // Must be non-negative.
  int32 skip = 6 [(google.api.field_behavior) = OPTIONAL];
}

// ListGroupsResponse is the response message for ListGroups.
message ListGroupsResponse {
  // Groups matching the filter criteria.
  repeated Group groups = 1;

  // Token for retrieving the next page of results.
  // Empty if no more results.
  string next_page_token = 2;

  // Total number of groups matching the filter.
  // Optional, provided for UI pagination.
  optional int64 total_count = 3;

  // Number of results that were skipped.
  // Accumulates across paginated requests.
  int32 skipped = 4;
}

// CreateGroupRequest is the request message for CreateGroup.
message CreateGroupRequest {
  // Parent group UIDP. Empty for creating root organizations.
  // Can be a UIDP, suffix, or name of a group in scope.
  string parent = 1 [(google.api.field_behavior) = OPTIONAL];

  // The group to create. Required fields: name.
  Group group = 2 [(google.api.field_behavior) = REQUIRED];
}

// UpdateGroupRequest is the request message for UpdateGroup.
message UpdateGroupRequest {
  // The group to update.
  Group group = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];

  // The list of fields to update. If not provided, an implied
  // field mask is used equivalent to all fields that are populated
  // (have non-default values). * is supported and interpreted as a full
  // replacement with the given field values.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];
}

// OrgKind is the kind of organization the group belongs to.
enum OrgKind {
  // Organization kind is not yet set.
  ORG_KIND_UNSPECIFIED = 0;
  // Free catalog starter organizations.
  ORG_KIND_STARTER = 1;
  // Paid customer organizations.
  ORG_KIND_CUSTOMER = 2;
  // Personal developer organizations.
  ORG_KIND_DEV = 3;
  // Organizations that are used for infrastructure or automation.
  ORG_KIND_INFRA = 4;
}

// OrgStatus is the provisioning status of an organization.
enum OrgStatus {
  // Organization status is not yet set.
  ORG_STATUS_UNSPECIFIED = 0;
  // The organization is awaiting provisioning setup by a reconciler.
  ORG_STATUS_INITIALIZING = 1;
  // The organization is fully provisioned and ready to use.
  ORG_STATUS_READY = 2;
}
