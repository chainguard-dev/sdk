syntax = "proto3";

package chainguard.platform.iam.v2beta1;

import "annotations/auth.proto";
import "annotations/events.proto";
import "annotations/mcp.proto";
import "capabilities/capabilities.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "platform/common/v1/uidp.platform.proto";

option go_package = "chainguard.dev/sdk/proto/chainguard/platform/iam/v2beta1";
option java_multiple_files = true;
option java_outer_classname = "GroupInvitesProto";
option java_package = "com.chainguard.platform.iam.v2beta1";

// GroupInvitesService manages group invite codes that register identities with Chainguard.
service GroupInvitesService {
  // CreateGroupInvite creates a new group invite under a parent group.
  rpc CreateGroupInvite(CreateGroupInviteRequest) returns (GroupInvite) {
    option (google.api.http) = {
      post: "/iam/v2beta1/groupInvites/{parent=**}"
      body: "group_invite"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [
          CAP_IAM_GROUP_INVITES_CREATE,
          // Creating a group invite is a future role binding promise.
          CAP_IAM_ROLE_BINDINGS_CREATE
        ]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.iam.group_invite.created.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
    option (chainguard.annotations.mcp) = {
      description: "Create a new group invite code that allows identities to join a group with a specified role."
      read_only: false
      destructive: false
      idempotent: false
      open_world: false
    };
  }

  // GetGroupInvite retrieves a single group invite by UID.
  rpc GetGroupInvite(GetGroupInviteRequest) returns (GroupInvite) {
    option (google.api.http) = {get: "/iam/v2beta1/groupInvites/{uid=**}"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_GROUP_INVITES_LIST]
      }
    };
    option (chainguard.annotations.mcp) = {
      description: "Get a group invite by its UIDP."
      read_only: true
      destructive: false
      idempotent: true
      open_world: false
    };
  }

  // DeleteGroupInvite deletes a group invite by UID.
  rpc DeleteGroupInvite(DeleteGroupInviteRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/iam/v2beta1/groupInvites/{uid=**}"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_GROUP_INVITES_DELETE]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.iam.group_invite.deleted.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
    option (chainguard.annotations.mcp) = {
      description: "Delete a group invite by its UIDP, revoking the invite code."
      read_only: false
      destructive: true
      idempotent: true
      open_world: false
    };
  }

  // ListGroupInvites returns group invites based on filter criteria with pagination support.
  rpc ListGroupInvites(ListGroupInvitesRequest) returns (ListGroupInvitesResponse) {
    option (google.api.http) = {get: "/iam/v2beta1/groupInvites"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_GROUP_INVITES_LIST]
        unscoped: true
      }
    };
    option (chainguard.annotations.mcp) = {
      description: "List group invites the caller has access to. Supports filtering and pagination."
      read_only: true
      destructive: false
      idempotent: true
      open_world: false
    };
  }
}

// GroupInvite represents a group invite code.
message GroupInvite {
  option (google.api.resource) = {
    type: "iam.chainguard.dev/GroupInvite"
    pattern: "groupInvites/{group_invite}"
    singular: "groupInvite"
    plural: "groupInvites"
  };

  // Unique identifier for the group invite (UIDP).
  // Generated by server.
  string uid = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (chainguard.annotations.iam_scope) = true
  ];

  // The role UIDP to assign when the invite is accepted.
  // Set this field when creating a group invite.
  string role_uid = 2 [(google.api.field_behavior) = REQUIRED];

  // The role associated with this invite, hydrated with name/description/capabilities.
  // Populated by the server on Get/List/Create responses.
  // May be absent if the referenced role has been deleted.
  GroupInviteRole role = 10 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Email address that is allowed to accept this invite code.
  // If blank, anyone with the invite code can accept.
  string email = 3 [(google.api.field_behavior) = OPTIONAL];

  // Time-to-live duration for the invite. Required on create;
  // consumed to compute expiration_time and not returned in responses.
  google.protobuf.Duration ttl = 4 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = INPUT_ONLY
  ];

  // When the invite expires.
  google.protobuf.Timestamp expiration_time = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Whether the invite can only be used once.
  bool single_use = 6 [(google.api.field_behavior) = OPTIONAL];

  // The invite code (only returned on create).
  string code = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The key ID for the invite verification key.
  string key_id = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the invite was created.
  google.protobuf.Timestamp create_time = 9 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// GroupInviteRole contains role details for a group invite.
message GroupInviteRole {
  // Unique identifier for the role.
  string uid = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  // Human-readable name of the role.
  string name = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
  // Optional description of the role.
  string description = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
  // Capabilities granted by this role.
  repeated chainguard.capabilities.Capability capabilities = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// CreateGroupInviteRequest is the request message for CreateGroupInvite.
message CreateGroupInviteRequest {
  // Parent group UIDP under which the invite will be created.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];

  // The group invite to create.
  GroupInvite group_invite = 2 [(google.api.field_behavior) = REQUIRED];
}

// GetGroupInviteRequest is the request message for GetGroupInvite.
message GetGroupInviteRequest {
  // UID of the group invite to retrieve.
  string uid = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];
}

// DeleteGroupInviteRequest is the request message for DeleteGroupInvite.
message DeleteGroupInviteRequest {
  // UID of the group invite to delete.
  string uid = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];
}

// ListGroupInvitesRequest is the request message for ListGroupInvites.
message ListGroupInvitesRequest {
  // Optional UIDP-based filter for hierarchy navigation.
  chainguard.platform.common.UIDPFilter uidp = 1 [(google.api.field_behavior) = OPTIONAL];

  // Optional key_id to filter by.
  string key_id = 2 [(google.api.field_behavior) = OPTIONAL];

  // Maximum number of results to return per page.
  // Default: 50, Maximum: 200.
  int32 page_size = 3 [(google.api.field_behavior) = OPTIONAL];

  // Page token from a previous List response for pagination.
  // Opaque token with 3-day expiration.
  string page_token = 4 [(google.api.field_behavior) = OPTIONAL];

  // Order results by field. Format: "field [asc|desc]"
  // Default: "created_at desc"
  // Note: Changing order_by between pages invalidates the page token.
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];

  // Number of results to skip before returning.
  // Used for random-access pagination (jumping to arbitrary pages).
  int32 skip = 6 [(google.api.field_behavior) = OPTIONAL];
}

// ListGroupInvitesResponse is the response message for ListGroupInvites.
message ListGroupInvitesResponse {
  // Group invites matching the filter criteria.
  repeated GroupInvite group_invites = 1;

  // Token for retrieving the next page of results.
  // Empty if no more results.
  string next_page_token = 2;

  // Total number of group invites matching the filter.
  // Optional, provided for UI pagination.
  optional int64 total_count = 3;

  // Number of results that were skipped.
  // Accumulates across paginated requests.
  int32 skipped = 4;
}
