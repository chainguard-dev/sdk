syntax = "proto3";

package chainguard.platform.iam.v2beta1;

import "annotations/auth.proto";
import "capabilities/capabilities.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "platform/common/v1/uidp.platform.proto";

option go_package = "chainguard.dev/sdk/proto/chainguard/platform/iam/v2beta1";
option java_multiple_files = true;
option java_outer_classname = "RolesProto";
option java_package = "com.chainguard.platform.iam.v2beta1";

// RolesService manages IAM roles.
service RolesService {
  // GetRole retrieves a single role by UID.
  rpc GetRole(GetRoleRequest) returns (Role) {
    option (google.api.http) = {get: "/iam/v2beta1/roles/{uid=**}"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_ROLES_LIST]
        // Unscoped to allow getting managed roles (at root level).
        // Service layer handles authorization for custom roles.
        unscoped: true
      }
    };
  }

  // ListRoles returns roles based on filter criteria with pagination support.
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse) {
    option (google.api.http) = {get: "/iam/v2beta1/roles"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_ROLES_LIST]
        unscoped: true
      }
    };
  }

  // CreateRole creates a new custom role.
  rpc CreateRole(CreateRoleRequest) returns (Role) {
    option (google.api.http) = {
      post: "/iam/v2beta1/roles/{parent=**}"
      body: "role"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_ROLES_CREATE]
      }
    };
  }

  // UpdateRole updates the given Role according to the provided field mask.
  // The fully populated Role is returned.
  rpc UpdateRole(UpdateRoleRequest) returns (Role) {
    option (google.api.http) = {
      patch: "/iam/v2beta1/roles/{role.uid=**}"
      body: "role"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_ROLES_UPDATE]
      }
    };
  }

  // DeleteRole deletes a custom role by UID.
  // Fails if the role is bound to any identities.
  // Managed (root-level) roles cannot be deleted.
  rpc DeleteRole(DeleteRoleRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/iam/v2beta1/roles/{uid=**}"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_ROLES_DELETE]
      }
    };
  }
}

// Role represents an IAM role with a set of capabilities.
message Role {
  option (google.api.resource) = {
    type: "iam.chainguard.dev/Role"
    pattern: "roles/{role}"
    singular: "role"
    plural: "roles"
  };

  // Unique identifier for the role (UIDP).
  // Generated by server.
  string uid = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (chainguard.annotations.iam_scope) = true
  ];

  // Human-readable name of the role.
  string name = 2 [(google.api.field_behavior) = REQUIRED];

  // Optional description of the role's purpose.
  string description = 3 [(google.api.field_behavior) = OPTIONAL];

  // Capabilities granted by this role.
  // Required on Create (at least one). Optional on Update (omit if not changing).
  repeated chainguard.capabilities.Capability capabilities = 4 [(google.api.field_behavior) = OPTIONAL];

  // When the role was created.
  google.protobuf.Timestamp create_time = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the role was last updated.
  google.protobuf.Timestamp update_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// GetRoleRequest is the request message for GetRole.
message GetRoleRequest {
  // UID of the role to retrieve.
  string uid = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];
}

// ListRolesRequest is the request message for ListRoles.
message ListRolesRequest {
  // Optional UIDP-based filter for hierarchy navigation.
  chainguard.platform.common.UIDPFilter uidp = 1 [(google.api.field_behavior) = OPTIONAL];

  // Optional exact name to filter by.
  string name = 2 [(google.api.field_behavior) = OPTIONAL];

  // Maximum number of results to return per page.
  // Default: 50, Maximum: 200.
  int32 page_size = 3 [(google.api.field_behavior) = OPTIONAL];

  // Page token from a previous List response for pagination.
  // Opaque token with 3-day expiration.
  string page_token = 4 [(google.api.field_behavior) = OPTIONAL];

  // Order results by field. Format: "field [asc|desc]"
  // Default: "uid asc"
  // Note: Changing order_by between pages invalidates the page token.
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];

  // Number of results to skip before returning.
  // Used for random-access pagination (jumping to arbitrary pages).
  // Can be combined with page_token to skip from cursor position.
  // Must be non-negative.
  int32 skip = 6 [(google.api.field_behavior) = OPTIONAL];
}

// ListRolesResponse is the response message for ListRoles.
message ListRolesResponse {
  // Roles matching the filter criteria.
  repeated Role roles = 1;

  // Token for retrieving the next page of results.
  // Empty if no more results.
  string next_page_token = 2;

  // Total number of roles matching the filter.
  // Optional, provided for UI pagination.
  optional int64 total_count = 3;

  // Number of results that were skipped.
  // Accumulates across paginated requests.
  int32 skipped = 4;
}

// CreateRoleRequest is the request message for CreateRole.
message CreateRoleRequest {
  // Parent group UIDP under which the new role will be created.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];

  // The role to create. Required fields: name, capabilities.
  Role role = 2 [(google.api.field_behavior) = REQUIRED];
}

// UpdateRoleRequest is the request message for UpdateRole.
message UpdateRoleRequest {
  // The role to update.
  Role role = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];

  // The list of fields to update. If not provided, an implied
  // field mask is used equivalent to all fields that are populated
  // (have non-default values). * is supported and interpreted as a full
  // replacement with the given field values.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];
}

// DeleteRoleRequest is the request message for DeleteRole.
message DeleteRoleRequest {
  // UID of the role to delete.
  string uid = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];
}
