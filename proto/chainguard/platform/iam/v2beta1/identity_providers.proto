syntax = "proto3";

package chainguard.platform.iam.v2beta1;

import "annotations/auth.proto";
import "annotations/events.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "platform/common/v1/uidp.platform.proto";

option go_package = "chainguard.dev/sdk/proto/chainguard/platform/iam/v2beta1";
option java_multiple_files = true;
option java_outer_classname = "IdentityProvidersProto";
option java_package = "com.chainguard.platform.iam.v2beta1";

// IdentityProvidersService manages external identity provider configurations for authentication.
service IdentityProvidersService {
  // ListIdentityProviders returns identity providers based on filter criteria with pagination support.
  rpc ListIdentityProviders(ListIdentityProvidersRequest) returns (ListIdentityProvidersResponse) {
    option (google.api.http) = {get: "/iam/v2beta1/identityProviders"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_IDENTITY_PROVIDERS_LIST]
        unscoped: true
      }
    };
  }

  // GetIdentityProvider retrieves a single identity provider by UID.
  rpc GetIdentityProvider(GetIdentityProviderRequest) returns (IdentityProvider) {
    option (google.api.http) = {get: "/iam/v2beta1/identityProviders/{uid=**}"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_IDENTITY_PROVIDERS_LIST]
      }
    };
  }

  // CreateIdentityProvider creates a new identity provider.
  rpc CreateIdentityProvider(CreateIdentityProviderRequest) returns (IdentityProvider) {
    option (google.api.http) = {
      post: "/iam/v2beta1/identityProviders/{parent=**}"
      body: "identity_provider"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [
          CAP_IAM_IDENTITY_PROVIDERS_CREATE,
          // Creating an IdentityProvider requires configuring a default role
          // for just-in-time role binding of new identities, which makes
          // it effectively a RoleBinding promise. Callers must have permission
          // to create the RoleBindings as well.
          CAP_IAM_ROLE_BINDINGS_CREATE
        ]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.iam.identity_providers.created.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
  }

  // UpdateIdentityProvider updates an identity provider.
  rpc UpdateIdentityProvider(UpdateIdentityProviderRequest) returns (IdentityProvider) {
    option (google.api.http) = {
      patch: "/iam/v2beta1/identityProviders/{identity_provider.uid=**}"
      body: "identity_provider"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [
          CAP_IAM_IDENTITY_PROVIDERS_UPDATE,
          // Updating an IdentityProvider provides to option of choosing
          // a default role, which makes it effectively a RoleBinding
          // promise, so check that the caller has permission to
          // create RoleBindings as well.
          CAP_IAM_ROLE_BINDINGS_CREATE
        ]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.iam.identity_providers.updated.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
  }

  // DeleteIdentityProvider deletes an identity provider by UID.
  rpc DeleteIdentityProvider(DeleteIdentityProviderRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/iam/v2beta1/identityProviders/{uid=**}"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_IDENTITY_PROVIDERS_DELETE]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.iam.identity_providers.deleted.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
  }
}

// IdentityProvider represents the configuration parameters necessary for performing
// authentication with an upstream identity provider.
message IdentityProvider {
  option (google.api.resource) = {
    type: "iam.chainguard.dev/IdentityProvider"
    pattern: "identityProviders/{identity_provider}"
    singular: "identityProvider"
    plural: "identityProviders"
  };

  // Unique identifier for the identity provider (UIDP).
  // Generated by server.
  string uid = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (chainguard.annotations.iam_scope) = true
  ];

  // Human-readable name of the identity provider.
  // Must be 3-63 characters.
  string name = 2 [(google.api.field_behavior) = REQUIRED];

  // Optional description of the identity provider.
  string description = 3 [(google.api.field_behavior) = OPTIONAL];

  // When the identity provider was created.
  google.protobuf.Timestamp create_time = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the identity provider was last updated.
  google.protobuf.Timestamp update_time = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The UIDP of the default role to grant users of this identity provider
  // on initial authentication. Users who already have an identity on this platform
  // are unaffected.
  string default_role = 6 [(google.api.field_behavior) = REQUIRED];

  // The upstream IdP configuration details for this identity provider.
  // Exactly one must be set.
  oneof configuration {
    // Defines the parameters necessary for authenticating with the OIDC flow.
    OIDC oidc = 20;
  }

  // Configuration parameters for performing an OIDC token exchange.
  message OIDC {
    // Issuer URL (e.g https://accounts.google.com)
    string issuer = 1 [(google.api.field_behavior) = REQUIRED];

    // Client ID of the identity provider. This is not considered sensitive.
    string client_id = 2 [(google.api.field_behavior) = REQUIRED];

    // Client secret of the identity provider. This is a sensitive value
    // and is not returned for list/get calls.
    string client_secret = 3 [(google.api.field_behavior) = REQUIRED];

    // Additional scopes to request for ID tokens from the upstream IdP.
    // Scope openid is always requested as part of the authentication flow.
    repeated string additional_scopes = 4 [(google.api.field_behavior) = OPTIONAL];
  }
}

// ListIdentityProvidersRequest is the request message for ListIdentityProviders
message ListIdentityProvidersRequest {
  // Filter records based on their position in the group hierarchy.
  chainguard.platform.common.UIDPFilter uidp = 1 [(google.api.field_behavior) = OPTIONAL];

  // Exact match on identity provider name
  string name = 2 [(google.api.field_behavior) = OPTIONAL];

  // Maximum number of results to return per page.
  // Default: 50, Maximum: 200.
  int32 page_size = 10 [(google.api.field_behavior) = OPTIONAL];

  // Page token from a previous List response for pagination.
  // Opaque token with 3-day expiration.
  string page_token = 11 [(google.api.field_behavior) = OPTIONAL];

  // Order results by field. Format: "field [asc|desc]"
  // Default: "uid asc"
  // Note: Changing order_by between pages invalidates the page token.
  string order_by = 12 [(google.api.field_behavior) = OPTIONAL];

  // Number of results to skip before returning.
  // Used for random-access pagination (jumping to arbitrary pages).
  // Can be combined with page_token to skip from cursor position.
  // Must be non-negative.
  int32 skip = 13 [(google.api.field_behavior) = OPTIONAL];
}

// ListIdentityProvidersResponse is the response message for ListIdentityProviders
message ListIdentityProvidersResponse {
  // Identity providers matching the filter criteria.
  repeated IdentityProvider identity_providers = 1;

  // Token for retrieving the next page of results.
  // Empty if no more results.
  string next_page_token = 2;

  // Total number of results matching the filter.
  // Optional, provided for UI pagination.
  optional int64 total_count = 3;

  // Number of results that were skipped.
  // Accumulates across paginated requests.
  int32 skipped = 4;
}

// GetIdentityProviderRequest is the request message for GetIdentityProvider
message GetIdentityProviderRequest {
  // UID of the identity provider to retrieve.
  string uid = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];
}

// CreateIdentityProviderRequest is the request message for CreateIdentityProvider
message CreateIdentityProviderRequest {
  // The exact UIDP of the IAM group to nest this identity provider under.
  string parent = 1 [
    (chainguard.annotations.iam_scope) = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // The configuration for an upstream identity provider
  IdentityProvider identity_provider = 2 [(google.api.field_behavior) = REQUIRED];
}

// UpdateIdentityProviderRequest is the request message for UpdateIdentityProvider.
message UpdateIdentityProviderRequest {
  // The identity provider to update.
  IdentityProvider identity_provider = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];

  // The list of fields to update. If not provided, an implied
  // field mask is used equivalent to all fields that are populated
  // (have non-default values). * is supported and interpreted as a full
  // replacement with the given field values.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];
}

// DeleteIdentityProviderRequest is the request message for DeleteIdentityProvider.
message DeleteIdentityProviderRequest {
  // UID of the identity provider to delete.
  string uid = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];
}
