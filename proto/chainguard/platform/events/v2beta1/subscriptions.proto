syntax = "proto3";

package chainguard.platform.events.v2beta1;

import "annotations/auth.proto";
import "annotations/events.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/empty.proto";
import "platform/common/v1/uidp.platform.proto";

option go_package = "chainguard.dev/sdk/proto/chainguard/platform/events/v2beta1";
option java_multiple_files = true;
option java_outer_classname = "SubscriptionsProto";
option java_package = "com.chainguard.platform.events.v2beta1";

// SubscriptionsService manages event subscriptions (webhooks).
service SubscriptionsService {
  // CreateSubscription registers a new event subscription under a group.
  rpc CreateSubscription(CreateSubscriptionRequest) returns (Subscription) {
    option (google.api.http) = {
      post: "/events/v2beta1/subscriptions/{parent=**}"
      body: "subscription"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_EVENTS_SUBSCRIPTION_CREATE]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.events.subscription.created.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
  }

  // ListSubscriptions returns subscriptions matching filter criteria.
  rpc ListSubscriptions(ListSubscriptionsRequest) returns (ListSubscriptionsResponse) {
    option (google.api.http) = {get: "/events/v2beta1/subscriptions"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_EVENTS_SUBSCRIPTION_LIST]
        unscoped: true
      }
    };
  }

  // DeleteSubscription removes an event subscription by UID.
  rpc DeleteSubscription(DeleteSubscriptionRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/events/v2beta1/subscriptions/{uid=**}"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_EVENTS_SUBSCRIPTION_DELETE]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.events.subscription.deleted.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
  }
}

// Subscription represents a registered interest in webhook events.
message Subscription {
  option (google.api.resource) = {
    type: "events.chainguard.dev/Subscription"
    pattern: "subscriptions/{subscription}"
    singular: "subscription"
    plural: "subscriptions"
  };

  // Unique identifier for the subscription (UIDP).
  // Generated by server.
  string uid = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (chainguard.annotations.iam_scope) = true
  ];

  // The routable HTTPS URL to which events are delivered.
  // Must use the https scheme.
  string sink = 2 [(google.api.field_behavior) = REQUIRED];
}

// CreateSubscriptionRequest is the request message for CreateSubscription.
message CreateSubscriptionRequest {
  // Parent group UIDP under which the subscription will be created.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];

  // The subscription to create. Required fields: sink.
  Subscription subscription = 2 [(google.api.field_behavior) = REQUIRED];
}

// ListSubscriptionsRequest is the request message for ListSubscriptions.
// TODO: add page_size, page_token, order_by, skip once the datastore
// SubscriptionFilter supports pagination (currently only uidp is supported).
message ListSubscriptionsRequest {
  // Optional UIDP-based filter for hierarchy navigation.
  chainguard.platform.common.UIDPFilter uidp = 1 [(google.api.field_behavior) = OPTIONAL];
}

// ListSubscriptionsResponse is the response message for ListSubscriptions.
message ListSubscriptionsResponse {
  // Subscriptions matching the filter criteria.
  repeated Subscription subscriptions = 1;
}

// DeleteSubscriptionRequest is the request message for DeleteSubscription.
message DeleteSubscriptionRequest {
  // UID of the subscription to delete.
  string uid = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];
}
