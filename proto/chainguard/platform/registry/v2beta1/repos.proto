syntax = "proto3";

package chainguard.platform.registry.v2beta1;

import "annotations/auth.proto";
import "annotations/events.proto";
import "annotations/mcp.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "platform/common/v1/uidp.platform.proto";

option go_package = "chainguard.dev/sdk/proto/chainguard/platform/registry/v2beta1";
option java_multiple_files = true;
option java_outer_classname = "ReposProto";
option java_package = "com.chainguard.platform.registry.v2beta1";

// ReposService manages Registry repositories.
service ReposService {
  // GetRepo retrieves a single repository by UID.
  rpc GetRepo(GetRepoRequest) returns (Repo) {
    option (google.api.http) = {get: "/registry/v2beta1/repos/{uid=**}"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_REPO_LIST]
      }
    };
    option (chainguard.annotations.mcp) = {
      description: "Get a container image repository by its UIDP."
      read_only: true
      destructive: false
      idempotent: true
      open_world: false
    };
  }

  // CreateRepo creates a repository under a parent group.
  rpc CreateRepo(CreateRepoRequest) returns (Repo) {
    option (google.api.http) = {
      post: "/registry/v2beta1/repos/{parent=**}"
      body: "repo"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_REPO_CREATE]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.platform.registry.repo.created.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
    option (chainguard.annotations.mcp) = {
      description: "Create a container image repository under a parent group."
      read_only: false
      destructive: false
      idempotent: false
      open_world: false
    };
  }

  // UpdateRepo updates a repository's mutable fields.
  rpc UpdateRepo(UpdateRepoRequest) returns (Repo) {
    option (google.api.http) = {
      patch: "/registry/v2beta1/repos/{repo.uid=**}"
      body: "repo"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_REPO_UPDATE]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.platform.registry.repo.updated.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
    option (chainguard.annotations.mcp) = {
      description: "Update a container image repository's mutable fields."
      read_only: false
      destructive: false
      idempotent: true
      open_world: false
    };
  }

  // DeleteRepo deletes a repository by UID.
  rpc DeleteRepo(DeleteRepoRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/registry/v2beta1/repos/{uid=**}"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_REPO_DELETE]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.platform.registry.repo.deleted.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
    option (chainguard.annotations.mcp) = {
      description: "Delete a container image repository by its UIDP."
      read_only: false
      destructive: true
      idempotent: true
      open_world: false
    };
  }

  // ListRepos returns repositories based on filter criteria with pagination support.
  rpc ListRepos(ListReposRequest) returns (ListReposResponse) {
    option (google.api.http) = {get: "/registry/v2beta1/repos"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_REPO_LIST]
        unscoped: true
      }
    };
    option (chainguard.annotations.mcp) = {
      description: "List container image repositories the caller has access to. Supports filtering by name and pagination."
      read_only: true
      destructive: false
      idempotent: true
      open_world: false
    };
  }
}

// Repo represents a container image repository.
message Repo {
  option (google.api.resource) = {
    type: "registry.chainguard.dev/Repo"
    pattern: "repos/{repo}"
    singular: "repo"
    plural: "repos"
  };

  // Unique identifier for the repository (UIDP).
  // Generated by server.
  string uid = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (chainguard.annotations.iam_scope) = true
  ];

  // Human-readable name of the repository.
  string name = 2 [(google.api.field_behavior) = REQUIRED];

  // Optional description of the repository.
  // Not settable on repositories with a sync_config because it is synced
  // from the source repository.
  string description = 3 [(google.api.field_behavior) = OPTIONAL];

  // Catalog tier this repository belongs to.
  // Only meaningful for repositories in Chainguard catalog organizations.
  // Not settable on repositories with a sync_config because it is synced
  // from the source repository.
  CatalogTier catalog_tier = 4 [(google.api.field_behavior) = OPTIONAL];

  // Sales grouping labels for the repository.
  // Only meaningful for repositories in Chainguard catalog organizations.
  // Not settable on repositories with a sync_config because they are synced
  // from the source repository.
  repeated string bundles = 5 [(google.api.field_behavior) = OPTIONAL];

  reserved 6;
  reserved "readme";

  // List of equivalent image names/aliases.
  // Not settable on repositories with a sync_config because they are synced
  // from the source repository.
  repeated string aliases = 7 [(google.api.field_behavior) = OPTIONAL];

  // Actively maintained tags in this repository.
  // Not settable on repositories with a sync_config because it reflects the
  // tags synced from the source repository.
  repeated string active_tags = 8 [(google.api.field_behavior) = OPTIONAL];

  // Repository sync configuration. If set, images and metadata are synced
  // from the source repository to this one.
  SyncConfig sync_config = 9 [
    json_name = "sync_config",
    (google.api.field_behavior) = OPTIONAL
  ];

  // Custom apko image configuration overlay applied when images are rebuilt
  // for this repository. Can only be set on repositories with custom
  // assembly enabled.
  CustomOverlay custom_overlay = 10 [(google.api.field_behavior) = OPTIONAL];

  // When the repository was created.
  google.protobuf.Timestamp create_time = 11 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the repository was last updated.
  google.protobuf.Timestamp update_time = 12 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// SyncConfig contains repository synchronization settings.
message SyncConfig {
  // Source repository to sync from.
  // Accepts a repository UIDP, a catalog name (e.g. "chainguard/nginx"), or
  // a full image reference (e.g. "cgr.dev/chainguard/nginx"); always stored
  // and returned as a UIDP. The caller's organization must have an active
  // entitlement for the source repository, or the caller must have pull
  // access to it.
  string source = 1 [(google.api.field_behavior) = REQUIRED];

  // Whether exported tags will be uniquely labeled.
  // Determined by your organization's settings.
  bool unique_tags = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the catalog syncer should stop syncing from the source repository.
  // Defaults to 14 days from creation.
  // This field is managed by Chainguard.
  google.protobuf.Timestamp expiration_time = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // GCP Artifact Registry destination repository to additionally sync
  // images to.
  string google = 4 [(google.api.field_behavior) = OPTIONAL];

  // AWS ECR destination repository to additionally sync images to.
  string amazon = 5 [(google.api.field_behavior) = OPTIONAL];

  // Azure ACR destination repository to additionally sync images to.
  string azure = 6 [(google.api.field_behavior) = OPTIONAL];

  // Apko configuration overlay applied when rebuilding images during sync.
  // This field is managed by Chainguard.
  string apko_overlay = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Whether EOL grace period is enabled.
  // Determined by your organization's settings.
  bool grace_period = 8 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// CustomOverlay contains apko image configuration customizations.
// Can only be used on repositories with custom assembly enabled.
message CustomOverlay {
  // Additional packages to include in the image.
  ImageContents contents = 1 [(google.api.field_behavior) = OPTIONAL];

  // Environment variables to set in the image.
  // Keys with the reserved prefix "CHAINGUARD_" are rejected.
  map<string, string> environment = 2 [(google.api.field_behavior) = OPTIONAL];

  // OCI annotations to add to the image.
  // Keys with the reserved prefixes "dev.chainguard." and
  // "org.opencontainers." are rejected.
  map<string, string> annotations = 3 [(google.api.field_behavior) = OPTIONAL];

  // Account customizations applied during rebuilds.
  Accounts accounts = 4 [(google.api.field_behavior) = OPTIONAL];

  // Custom certificates to include in the image.
  Certificates certificates = 5 [(google.api.field_behavior) = OPTIONAL];

  // ImageContents specifies additional image content.
  message ImageContents {
    // Packages to append to the image.
    repeated string packages = 1 [(google.api.field_behavior) = OPTIONAL];

    // Custom APK repository URLs to write to /etc/apk/repositories in the
    // assembled image. When set, these replace the default virtualapk.cgr.dev
    // repositories.
    repeated string runtime_repositories = 2 [(google.api.field_behavior) = OPTIONAL];
  }

  // Accounts specifies user/group configuration.
  message Accounts {
    // Run-as user configuration.
    string run_as = 1 [(google.api.field_behavior) = OPTIONAL];

    // User entries to add.
    repeated User users = 2 [(google.api.field_behavior) = OPTIONAL];

    // Group entries to add.
    repeated Group groups = 3 [(google.api.field_behavior) = OPTIONAL];

    // User represents a user account.
    message User {
      // Username for the account.
      string username = 1 [(google.api.field_behavior) = REQUIRED];

      // User ID for the account.
      int32 uid = 2 [(google.api.field_behavior) = OPTIONAL];

      // Primary group ID for the account.
      int32 gid = 3 [(google.api.field_behavior) = OPTIONAL];

      // Primary group name for the account.
      string group_name = 4 [(google.api.field_behavior) = OPTIONAL];

      // Login shell for the account.
      string shell = 5 [(google.api.field_behavior) = OPTIONAL];

      // Home directory for the account.
      string home_dir = 6 [(google.api.field_behavior) = OPTIONAL];
    }

    // Group represents a group account.
    message Group {
      // Name of the group.
      string groupname = 1 [(google.api.field_behavior) = REQUIRED];

      // Group ID for the account.
      int32 gid = 2 [(google.api.field_behavior) = OPTIONAL];

      // Members of the group.
      repeated string members = 3 [(google.api.field_behavior) = OPTIONAL];
    }
  }

  // Certificates specifies additional certificate configuration.
  message Certificates {
    // Additional certificates to include.
    repeated AdditionalEntry additional = 1 [(google.api.field_behavior) = OPTIONAL];

    // Certificate providers via packages.
    repeated string providers = 2 [(google.api.field_behavior) = OPTIONAL];

    // AdditionalEntry represents a single certificate.
    message AdditionalEntry {
      // Name of the certificate file.
      string name = 1 [(google.api.field_behavior) = REQUIRED];

      // PEM-encoded certificate content.
      string content = 2 [(google.api.field_behavior) = REQUIRED];
    }
  }
}

// GetRepoRequest is the request message for GetRepo.
message GetRepoRequest {
  // UID of the repository to retrieve.
  string uid = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];
}

// DeleteRepoRequest is the request message for DeleteRepo.
message DeleteRepoRequest {
  // UID of the repository to delete.
  string uid = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];
}

// CreateRepoRequest is the request message for CreateRepo.
message CreateRepoRequest {
  // Parent group UIDP under which to create the repository.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];

  // The repository to create. Required fields: name.
  Repo repo = 2 [(google.api.field_behavior) = REQUIRED];
}

// UpdateRepoRequest is the request message for UpdateRepo.
message UpdateRepoRequest {
  // The repository to update. The uid identifies the repository.
  Repo repo = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];

  // The list of fields to update. If not provided, an implied
  // field mask is used equivalent to all fields that are populated
  // (have non-default values). * is supported and interpreted as a full
  // replacement with the given field values.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];
}

// ListReposRequest is the request message for ListRepos.
message ListReposRequest {
  // Optional UIDP-based filter for hierarchy navigation.
  chainguard.platform.common.UIDPFilter uidp = 1 [(google.api.field_behavior) = OPTIONAL];

  // Optional exact name to filter by.
  optional string name = 2 [(google.api.field_behavior) = OPTIONAL];

  reserved 3;
  reserved "exclude_readme";

  // Maximum number of results to return per page.
  // Default: 50, Maximum: 200.
  int32 page_size = 4 [(google.api.field_behavior) = OPTIONAL];

  // Page token from a previous List response for pagination.
  // Opaque token with 3-day expiration.
  string page_token = 5 [(google.api.field_behavior) = OPTIONAL];

  // Order results by field. Format: "field [asc|desc]"
  // Default: "uid asc"
  // Note: Changing order_by between pages invalidates the page token.
  string order_by = 6 [(google.api.field_behavior) = OPTIONAL];

  // Number of results to skip before returning.
  // Used for random-access pagination (jumping to arbitrary pages).
  // Can be combined with page_token to skip from cursor position.
  // Must be non-negative.
  int32 skip = 7 [(google.api.field_behavior) = OPTIONAL];
}

// ListReposResponse is the response message for ListRepos.
message ListReposResponse {
  // Repositories matching the filter criteria.
  repeated Repo repos = 1;

  // Token for retrieving the next page of results.
  // Empty if no more results.
  string next_page_token = 2;

  // Total number of repositories matching the filter.
  // Optional, provided for UI pagination.
  optional int64 total_count = 3;

  // Number of results that were skipped.
  // Accumulates across paginated requests.
  int32 skipped = 4;
}

// CatalogTier represents the catalog tier classification for repositories.
enum CatalogTier {
  // Unknown or unspecified tier.
  CATALOG_TIER_UNSPECIFIED = 0;

  // Application images tier.
  CATALOG_TIER_APPLICATION = 1;

  // Base images tier.
  CATALOG_TIER_BASE = 2;

  // FIPS-compliant images tier.
  CATALOG_TIER_FIPS = 3;

  // AI/ML images tier.
  CATALOG_TIER_AI = 4;

  // Developer tools images tier.
  CATALOG_TIER_DEVTOOLS = 5;

  // Commercial images tier.
  CATALOG_TIER_COMMERCIAL = 6;
}
