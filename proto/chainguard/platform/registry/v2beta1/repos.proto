syntax = "proto3";

package chainguard.platform.registry.v2beta1;

import "annotations/auth.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";
import "platform/common/v1/uidp.platform.proto";

option go_package = "chainguard.dev/sdk/proto/chainguard/platform/registry/v2beta1";
option java_multiple_files = true;
option java_outer_classname = "ReposProto";
option java_package = "com.chainguard.platform.registry.v2beta1";

// ReposService manages Registry repositories.
service ReposService {
  // GetRepo retrieves a single repository by UID.
  rpc GetRepo(GetRepoRequest) returns (Repo) {
    option (google.api.http) = {get: "/registry/v2beta1/repos/{uid=**}"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_REPO_LIST]
      }
    };
  }

  // ListRepos returns repositories based on filter criteria with pagination support.
  rpc ListRepos(ListReposRequest) returns (ListReposResponse) {
    option (google.api.http) = {get: "/registry/v2beta1/repos"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_REPO_LIST]
        unscoped: true
      }
    };
  }
}

// Repo represents a container image repository.
message Repo {
  option (google.api.resource) = {
    type: "registry.chainguard.dev/Repo"
    pattern: "repos/{repo}"
    singular: "repo"
    plural: "repos"
  };

  // Unique identifier for the repository (UIDP).
  // Generated by server.
  string uid = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Human-readable name of the repository.
  string name = 2 [(google.api.field_behavior) = REQUIRED];

  // Optional description of the repository.
  string description = 3 [(google.api.field_behavior) = OPTIONAL];

  // Catalog tier this repository belongs to.
  CatalogTier catalog_tier = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Sales grouping labels for the repository.
  repeated string bundles = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Raw Markdown content describing the repository.
  string readme = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // List of equivalent image names/aliases.
  repeated string aliases = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Actively maintained tags in this repository.
  repeated string active_tags = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Repository sync configuration for image mirroring.
  SyncConfig sync_config = 9 [
    json_name = "sync_config",
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Custom apko image configuration overlay.
  CustomOverlay custom_overlay = 10 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the repository was created.
  google.protobuf.Timestamp create_time = 11 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the repository was last updated.
  google.protobuf.Timestamp update_time = 12 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// SyncConfig contains repository synchronization settings.
message SyncConfig {
  // Source repository UIDP to sync from.
  string source = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Whether exported tags will be uniquely labeled.
  bool unique_tags = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the catalog syncer should stop syncing.
  google.protobuf.Timestamp expiration_time = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // GCP Artifact Registry destination repository.
  string google = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // AWS ECR destination repository.
  string amazon = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Azure ACR destination repository.
  string azure = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Apko overlay configuration name.
  string apko_overlay = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Whether EOL grace period is enabled.
  bool grace_period = 8 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// CustomOverlay contains apko image configuration customizations.
message CustomOverlay {
  // Additional packages to include in the image.
  ImageContents contents = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Environment variables to set in the image.
  map<string, string> environment = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // OCI annotations to add to the image.
  map<string, string> annotations = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Account customizations applied during rebuilds.
  Accounts accounts = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Custom certificates to include in the image.
  Certificates certificates = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // ImageContents specifies additional image content.
  message ImageContents {
    // Packages to append to the image.
    repeated string packages = 1;
  }

  // Accounts specifies user/group configuration.
  message Accounts {
    // Run-as user configuration.
    string run_as = 1;

    // User entries to add.
    repeated User users = 2;

    // Group entries to add.
    repeated Group groups = 3;

    // User represents a user account.
    message User {
      // Username for the account.
      string username = 1;

      // User ID for the account.
      int32 uid = 2;

      // Primary group ID for the account.
      int32 gid = 3;

      // Primary group name for the account.
      string group_name = 4;

      // Login shell for the account.
      string shell = 5;

      // Home directory for the account.
      string home_dir = 6;
    }

    // Group represents a group account.
    message Group {
      // Name of the group.
      string groupname = 1;

      // Group ID for the account.
      int32 gid = 2;

      // Members of the group.
      repeated string members = 3;
    }
  }

  // Certificates specifies additional certificate configuration.
  message Certificates {
    // Additional certificates to include.
    repeated AdditionalEntry additional = 1;

    // Ceritificate providers via packages.
    repeated string providers = 2;

    // AdditionalEntry represents a single certificate.
    message AdditionalEntry {
      // Name of the certificate file.
      string name = 1;

      // PEM-encoded certificate content.
      string content = 2;
    }
  }
}

// GetRepoRequest is the request message for GetRepo.
message GetRepoRequest {
  // UID of the repository to retrieve.
  string uid = 1 [
    (google.api.field_behavior) = REQUIRED,
    (chainguard.annotations.iam_scope) = true
  ];
}

// ListReposRequest is the request message for ListRepos.
message ListReposRequest {
  // Optional UIDP-based filter for hierarchy navigation.
  chainguard.platform.common.UIDPFilter uidp = 1 [(google.api.field_behavior) = OPTIONAL];

  // Optional exact name to filter by.
  optional string name = 2 [(google.api.field_behavior) = OPTIONAL];

  // Whether to exclude the readme field from results.
  // Defaults to false (readme included).
  optional bool exclude_readme = 3 [(google.api.field_behavior) = OPTIONAL];

  // Maximum number of results to return per page.
  // Default: 50, Maximum: 200.
  int32 page_size = 4 [(google.api.field_behavior) = OPTIONAL];

  // Page token from a previous List response for pagination.
  // Opaque token with 3-day expiration.
  string page_token = 5 [(google.api.field_behavior) = OPTIONAL];

  // Order results by field. Format: "field [asc|desc]"
  // Default: "uid asc"
  // Note: Changing order_by between pages invalidates the page token.
  string order_by = 6 [(google.api.field_behavior) = OPTIONAL];

  // Number of results to skip before returning.
  // Used for random-access pagination (jumping to arbitrary pages).
  // Can be combined with page_token to skip from cursor position.
  // Must be non-negative.
  int32 skip = 7 [(google.api.field_behavior) = OPTIONAL];
}

// ListReposResponse is the response message for ListRepos.
message ListReposResponse {
  // Repositories matching the filter criteria.
  repeated Repo repos = 1;

  // Token for retrieving the next page of results.
  // Empty if no more results.
  string next_page_token = 2;

  // Total number of repositories matching the filter.
  // Optional, provided for UI pagination.
  optional int64 total_count = 3;

  // Number of results that were skipped.
  // Accumulates across paginated requests.
  int32 skipped = 4;
}

// CatalogTier represents the catalog tier classification for repositories.
enum CatalogTier {
  // Unknown or unspecified tier.
  CATALOG_TIER_UNSPECIFIED = 0;

  // Application images tier.
  CATALOG_TIER_APPLICATION = 1;

  // Base images tier.
  CATALOG_TIER_BASE = 2;

  // FIPS-compliant images tier.
  CATALOG_TIER_FIPS = 3;

  // AI/ML images tier.
  CATALOG_TIER_AI = 4;

  // Developer tools images tier.
  CATALOG_TIER_DEVTOOLS = 5;
}
