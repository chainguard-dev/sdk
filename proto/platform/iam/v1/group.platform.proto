syntax = "proto3";

package chainguard.platform.iam;

import "annotations/auth.proto";
import "annotations/events.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "platform/common/v1/uidp.platform.proto";

option go_package = "chainguard.dev/sdk/proto/platform/iam/v1";

service Groups {
  rpc Create(CreateGroupRequest) returns (Group) {
    option (google.api.http) = {
      post: "/iam/v1/groups/{parent=**}"
      body: "group"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_GROUPS_CREATE]
        // We treat group creation as unscoped in order
        // to allow users to create new root groups.
        unscoped: true
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.iam.group.created.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
  }

  rpc Update(Group) returns (Group) {
    option (google.api.http) = {
      put: "/iam/v1/groups/{id=**}"
      body: "*"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_GROUPS_UPDATE]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.iam.group.updated.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
  }

  rpc List(GroupFilter) returns (GroupList) {
    option (google.api.http) = {get: "/iam/v1/groups"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_GROUPS_LIST]
        unscoped: true
      }
    };
  }

  rpc Delete(DeleteGroupRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/iam/v1/groups/{id=**}"};
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_IAM_GROUPS_DELETE]
      }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.iam.group.deleted.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
  }

  // LookupGroup returns the verified root group whose name matches the email
  // domain on the caller's token, when the token comes from a trusted upstream
  // identity provider that performs its own email verification.
  // See the v2beta1 GroupsService.LookupGroup for full semantics.
  rpc LookupGroup(LookupGroupRequest) returns (LookupGroupResponse) {
    option (google.api.http) = {get: "/iam/v1/groups:lookupGroup"};
    option (chainguard.annotations.iam) = {
      enabled: {unscoped: true}
    };
  }

  // RequestGroupAccess sends an access request from the caller to the owners
  // of the given verified root group. See the v2beta1 GroupsService.RequestGroupAccess
  // for full semantics.
  rpc RequestGroupAccess(RequestGroupAccessRequest) returns (RequestGroupAccessResponse) {
    option (google.api.http) = {
      post: "/iam/v1/groups/{group_id=**}:requestGroupAccess"
      body: "*"
    };
    option (chainguard.annotations.iam) = {
      enabled: {unscoped: true}
    };
  }

  // CheckEligibility reports whether the caller passes the same eligibility
  // gates applied by LookupGroup and RequestGroupAccess. A response of
  // eligible=true does not guarantee those calls succeed for other reasons
  // (no matching org, already requested, etc.).
  rpc CheckEligibility(CheckEligibilityRequest) returns (CheckEligibilityResponse) {
    option (google.api.http) = {get: "/iam/v1/groups:checkEligibility"};
    option (chainguard.annotations.iam) = {
      enabled: {unscoped: true}
    };
  }
}

message Group {
  // id, The group UIDP under which this group resides.
  string id = 1 [(chainguard.annotations.iam_scope) = true];
  // name, human readable name of group.
  string name = 2;
  // description, human readable of group.
  string description = 3;
  // resource_limits indicate the maximum number of resources allowed for this group by type.
  map<string, int32> resource_limits = 4;
  // verified means we've verified the owners of this organization. Restrictions include:
  // - Only organizations (root groups) can be verified
  // - Property can only be set by manually by Chainguardians
  // - If verified is set, the organizations name field must be globally unique
  // - If verified is set the organizations name should be a domain name
  bool verified = 5;
  // kind is the organization kind. For root groups this is their own kind;
  // for subgroups it is inherited from the root group.
  OrgKind kind = 6;
  // status is the provisioning status of the organization.
  OrgStatus status = 7;
}

message GroupList {
  repeated Group items = 1;
}

message GroupFilter {
  // id is the exact UID of the record.
  string id = 1;
  // uidp filters records based on their position in the group hierarchy.
  chainguard.platform.common.UIDPFilter uidp = 2;
  // name is the exact name of the record.
  string name = 3;
}

message CreateGroupRequest {
  // parent, The Group UIDP path under which the new Group resides.
  // This is effectively the iam_scope for Create requests, but because
  // we also allow users to create new "root" groups, we check the scoping
  // manually. Parent is allowed to be a prefix of a UIDP of a Group within
  // scope, or the name of a Group in scope.
  string parent = 1;
  // Group to create.
  Group group = 2;
}

message DeleteGroupRequest {
  // id is the exact UIDP of the record.
  string id = 1 [(chainguard.annotations.iam_scope) = true];
}

// LookupGroupRequest is the request message for LookupGroup.
// It is intentionally empty: the lookup is driven entirely by the caller's
// token claims.
message LookupGroupRequest {}

// LookupGroupResponse is the response message for LookupGroup.
message LookupGroupResponse {
  // The group matching the caller's email domain from their token.
  Group group = 1;
}

// RequestGroupAccessRequest is the request message for RequestGroupAccess.
message RequestGroupAccessRequest {
  // group_id is the UIDP of the group to request access to. Must be the
  // group whose name matches the email domain on the caller's token; the
  // server revalidates this on every call.
  string group_id = 1;
}

// RequestGroupAccessResponse is the response message for RequestGroupAccess.
// It is intentionally empty; the access request is delivered out of band.
message RequestGroupAccessResponse {}

// CheckEligibilityRequest is the request message for CheckEligibility.
// It is intentionally sparse because CheckEligibility uses the email
// domain on the caller's token to perform the validation. No user-supplied
// arguments are necessary.
message CheckEligibilityRequest {}

// CheckEligibilityResponse is the response message for CheckEligibility.
message CheckEligibilityResponse {
  // Indicates if the domain of the caller's email address is eligible
  // for email-domain-gated Groups flows.
  bool eligible = 1;
}

// OrgStatus is the provisioning status of an organization.
enum OrgStatus {
  // Organization status is not yet set.
  ORG_STATUS_UNSPECIFIED = 0;
  // The organization is awaiting provisioning setup by a reconciler.
  ORG_STATUS_INITIALIZING = 1;
  // The organization is fully provisioned and ready to use.
  ORG_STATUS_READY = 2;
  // The organization is suspended and unavailable to its members.
  ORG_STATUS_SUSPENDED = 3;
}

// OrgKind is the kind of organization the group belongs to.
enum OrgKind {
  ORG_KIND_UNSPECIFIED = 0;
  // Free catalog starter organizations.
  ORG_KIND_STARTER = 1;
  // Paid customer organizations.
  ORG_KIND_CUSTOMER = 2;
  // Personal developer organizations.
  ORG_KIND_DEV = 3;
  // Organizations that are used for infrastructure or automation.
  ORG_KIND_INFRA = 4;
}
