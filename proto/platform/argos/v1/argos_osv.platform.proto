syntax = "proto3";

option go_package = "chainguard.dev/sdk/proto/platform/argos/v1";

package chainguard.platform.argos;

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "annotations/auth.proto";

// ArgosOSV is the customer-facing OSV-spec query surface for the Private OSV
// shared corpus. All members holding CAP_ARGOS_OSV_READ see the same record
// set; there is no per-organisation filtering. Records are customer-blind.
service ArgosOSV {
  rpc Query(OSVQueryRequest) returns (OSVQueryResponse) {
    option (google.api.http) = {
      post: "/argos/v1/osv/query"
      body: "*"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_ARGOS_OSV_READ]
        unscoped: true
      }
    };
  }
  rpc QueryBatch(OSVQueryBatchRequest) returns (OSVQueryBatchResponse) {
    option (google.api.http) = {
      post: "/argos/v1/osv/querybatch"
      body: "*"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_ARGOS_OSV_READ]
        unscoped: true
      }
    };
  }
  rpc GetVuln(GetOSVRequest) returns (OSVRecord) {
    option (google.api.http) = {
      get: "/argos/v1/osv/vulns/{id=**}"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_ARGOS_OSV_READ]
        unscoped: true
      }
    };
  }
}

message Package {
  string ecosystem = 1;
  string name = 2;
  string purl = 3;
}

message Event {
  oneof event {
    string introduced = 1;
    string fixed = 2;
    string last_affected = 3 [json_name = "last_affected"];
    string limit = 4;
  }
}

message Range {
  // RangeType mirrors the OSV spec's `type` enum. Value names are
  // deliberately unprefixed so the protojson wire form matches OSV verbatim
  // (the spec uses bare "SEMVER" / "ECOSYSTEM" / "GIT"); nested-enum scoping
  // means Go consumers see Range_SEMVER, Range_ECOSYSTEM, Range_GIT.
  enum RangeType {
    UNSPECIFIED = 0;
    SEMVER = 1;
    ECOSYSTEM = 2;
    GIT = 3;
  }
  RangeType type = 1;
  string repo = 2;
  repeated Event events = 3;
}

message Affected {
  Package package = 1;
  repeated Range ranges = 2;
  repeated string versions = 3;
  // ecosystem_specific is the OSV-spec free-form ecosystem-owned extension
  // object. Currently never populated.
  google.protobuf.Struct ecosystem_specific = 4 [json_name = "ecosystem_specific"];
  // database_specific is the Chainguard atomic-vulnerability extension; see
  // DatabaseSpecific.
  DatabaseSpecific database_specific = 5 [json_name = "database_specific"];
}

// DatabaseSpecific is the Chainguard database-owned extension on an Affected
// entry: the atomic-vulnerability classification and sink location for the
// record. Field names are pinned to OSV-spec snake_case via json_name.
message DatabaseSpecific {
  // cwe_ids is the ordered list of CWE classifications; the lead (most
  // specific) CWE is cwe_ids[0].
  repeated string cwe_ids = 1 [json_name = "cwe_ids"];

  // sink_locator is the structured sink of the defect within the upstream
  // package's own source. Unset for non-flow defects.
  SinkLocator sink_locator = 2 [json_name = "sink_locator"];

  // defect_kind is the coarse defect class: "missing-control",
  // "incorrect-control", or "configuration-default".
  string defect_kind = 3 [json_name = "defect_kind"];
}

// SinkLocator locates a defect's sink within the upstream package source.
message SinkLocator {
  // class is the fully-qualified class/type of the sink (or module path for
  // non-OO languages).
  string class = 1;

  // method is the symbolic method/function at the sink.
  string method = 2;

  // arg_signature is the sink's argument signature, when known.
  string arg_signature = 3 [json_name = "arg_signature"];

  // file_line is the sink's source location, e.g. "src/.../X.java:NNN".
  string file_line = 4 [json_name = "file_line"];
}

message Severity {
  string type = 1;
  string score = 2;
}

message OSVRecord {
  string id = 1;
  string schema_version = 2 [json_name = "schema_version"];
  string summary = 3;
  string details = 4;
  repeated string aliases = 5;
  repeated Severity severity = 6;
  repeated Affected affected = 7;
  google.protobuf.Timestamp published = 8;
  google.protobuf.Timestamp modified = 9;
  repeated string related = 10;
}

message OSVQueryRequest {
  Package package = 1;
  string version = 2;
  // page_token is the opaque cursor from a previous response's next_page_token.
  // Empty starts at the first page. (OSV spec: query supports page_token.)
  string page_token = 3 [json_name = "page_token"];
}

message OSVQueryResponse {
  repeated OSVRecord vulns = 1;
  // next_page_token is the cursor for the next page; empty when last page.
  string next_page_token = 2 [json_name = "next_page_token"];
}

// MinimalOSVRecord is the abbreviated vuln entry returned by QueryBatch,
// matching the OSV spec's batch response (id + modified only); callers
// follow up with GetVuln for full detail.
message MinimalOSVRecord {
  string id = 1;
  google.protobuf.Timestamp modified = 2;
}

message OSVQueryBatchRequest {
  repeated OSVQueryRequest queries = 1;
}

message OSVQueryBatchResult {
  repeated MinimalOSVRecord vulns = 1;
  // next_page_token paginates this query's results (OSV batch spec).
  string next_page_token = 2 [json_name = "next_page_token"];
}

message OSVQueryBatchResponse {
  repeated OSVQueryBatchResult results = 1;
}

message GetOSVRequest {
  string id = 1;
}
