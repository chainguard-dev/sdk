syntax = "proto3";

option go_package = "chainguard.dev/sdk/proto/platform/libraries/v1";

package chainguard.platform.libraries;

import "annotations/auth.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
service NpmPackages {
  rpc List(NpmPackageFilter) returns (NpmPackageList) {
    option (google.api.http) = {
      get: "/libraries/v1/npm/packages"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_LIBRARIES_ARTIFACTS_LIST]
        unscoped: true
      }
    };
  }

  rpc ListVersions(NpmPackageVersionFilter) returns (NpmPackageVersionList) {
    option (google.api.http) = {
      get: "/libraries/v1/npm/packages/versions"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_LIBRARIES_ARTIFACTS_LIST]
        unscoped: true
      }
    };
  }
}

// NpmPackage contains metadata about an npm package available in
// Chainguard Libraries. The package name can be used to retrieve
// version-level details via ListVersions.
message NpmPackage {
  // The npm package name (e.g. "react" or "@types/node").
  string package_name = 1;
  // The most recent version of this package available.
  string latest_version = 2;
  // A short description of the package.
  string description = 3;
  // The SPDX license identifier for this package.
  string license = 4;
  // The number of versions available for this package.
  int64 version_count = 5;
  // The source type this package summary belongs to. Packages are scoped by
  // source type, so the same name may appear once per source type.
  NpmSourceType source_type = 6;
}

// A collection of NpmPackages as returned by calls to List.
// Contains pagination fields to allow callers to request additional
// pages of results if the set exceeds the requested page size.
message NpmPackageList {
  // The list of npm packages matching the request.
  repeated NpmPackage items = 1;
  // A token that can be reused on subsequent requests to retrieve
  // the next page of results. Other filter fields must match
  // the call that provided this token.
  string next_page_token = 2;
  // The total number of packages matching the query.
  int64 total_count = 3;
}

// Options to filter results of List.
message NpmPackageFilter {
  // A string to search packages by. If empty, all packages
  // will be returned. When set, results are ranked by relevance.
  string query = 1;
  // The maximum number of packages to return per request.
  // The service may return fewer than this value.
  int64 page_size = 2;
  // The token received from a previous call to List.
  // Provide this to retrieve the subsequent page.
  string page_token = 3;
  // The source types to include. If empty, defaults to all.
  repeated NpmSourceType source_types = 4;
}

// NpmSourceType indicates the origin of a package version.
enum NpmSourceType {
  NPM_SOURCE_TYPE_UNKNOWN = 0;
  NPM_SOURCE_TYPE_INTERNAL = 1;
  NPM_SOURCE_TYPE_INTERNAL_REMEDIATED = 2;
  NPM_SOURCE_TYPE_UPSTREAM_REGISTRY = 3;
}

// NpmPackageVersion contains metadata about a specific version of an
// npm package available in Chainguard Libraries.
message NpmPackageVersion {
  // package_name is the full package name including scope.
  // e.g., "@scope/lib" or "react"
  string package_name = 1;
  // version is the semver string.
  // e.g., "18.2.0"
  string version = 2;
  // license is the SPDX license identifier for this version (e.g., "MIT", "Apache-2.0").
  string license = 3;
  // created_at is when the record was created in the database.
  google.protobuf.Timestamp created_at = 4;
  // file_size is the size of the tarball in bytes.
  int64 file_size = 5;
  // file_count is the number of files inside the tarball.
  int64 file_count = 6;
  // source_type indicates the origin of this version.
  NpmSourceType source_type = 7;
  // sha512 is the SHA-512 checksum of the tarball (required).
  string sha512 = 8;
  // updated_at is when the record was last updated.
  google.protobuf.Timestamp updated_at = 9;
  // upstream_published_date is when the package was published upstream (optional).
  google.protobuf.Timestamp upstream_published_date = 10;
  // integrity is the SRI string (optional).
  string integrity = 11;
  // provenance_predicate_type is the SLSA predicate type URI if provenance was
  // provided at publish time. Empty string if no provenance was provided.
  // e.g., "https://slsa.dev/provenance/v1" or "https://slsa.dev/provenance/v0.2"
  string provenance_predicate_type = 12;
  // putument_ref is the R2 storage path to the raw putument JSON blob.
  string putument_ref = 13;
  // version_metadata is a JSON blob of the version object from the putument,
  // used to serve rich packument responses without fetching from R2.
  string version_metadata = 14;
  // malware_scanned indicates whether this version has been scanned for malware.
  bool malware_scanned = 15;
  // malware_malicious indicates whether this version was flagged as malicious.
  bool malware_malicious = 16;
  // malware_scanned_at is when the malware scan was performed.
  google.protobuf.Timestamp malware_scanned_at = 17;
  // sbom_formats are the supported sbom formats for this package.
  repeated string sbom_formats = 18;
}

// A collection of NpmPackageVersions as returned by calls to ListVersions.
// Contains pagination fields to allow callers to request additional
// pages of results if the set exceeds the requested page size.
message NpmPackageVersionList {
  // The list of package versions matching the request.
  repeated NpmPackageVersion items = 1;
  // A token that can be reused on subsequent requests to retrieve
  // the next page of results.
  string next_page_token = 2;
  // The total number of versions available for the package.
  int64 total_count = 3;
}

// Options to filter results of ListVersions.
message NpmPackageVersionFilter {
  // The npm package name to list versions for (required).
  string package_name = 1;
  // The maximum number of versions to return per request.
  // The service may return fewer than this value.
  int64 page_size = 2;
  // The token received from a previous call to ListVersions.
  // Provide this to retrieve the subsequent page.
  string page_token = 3;
  // The source types to include. If empty, defaults to all.
  repeated NpmSourceType source_types = 4;
}
