syntax = "proto3";

option go_package = "chainguard.dev/sdk/proto/platform/policies/v1";

package chainguard.platform.policies.v1;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "annotations/auth.proto";
import "annotations/events.proto";
import "platform/common/v1/uidp.platform.proto";

service Policies {
  rpc CreatePolicy(CreatePolicyRequest) returns (Policy) {
    option (google.api.http) = {
      post: "/policies/v1/policies/{parent_id=**}"
      body: "policy"
    };
    option (chainguard.annotations.iam) = {
      enabled: { capabilities: [CAP_POLICIES_POLICY_CREATE] }
    };
  }

  rpc UpdatePolicy(Policy) returns (Policy) {
    option (google.api.http) = {
      put: "/policies/v1/policies/{id=**}"
      body: "*"
    };
    option (chainguard.annotations.iam) = {
      enabled: { capabilities: [CAP_POLICIES_POLICY_UPDATE] }
    };
  }

  rpc ListPolicies(PolicyFilter) returns (PolicyList) {
    option (google.api.http) = {
      get: "/policies/v1/policies"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_POLICIES_POLICY_LIST]
        unscoped: true
      }
    };
  }

  rpc DeletePolicy(DeletePolicyRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/policies/v1/policies/{id=**}"
    };
    option (chainguard.annotations.iam) = {
      enabled: { capabilities: [CAP_POLICIES_POLICY_DELETE] }
    };
  }
}

service Bindings {
  rpc CreateBinding(CreateBindingRequest) returns (Binding) {
    option (google.api.http) = {
      post: "/policies/v1/bindings/{parent_id=**}"
      body: "binding"
    };
    option (chainguard.annotations.iam) = {
      enabled: { capabilities: [CAP_POLICIES_BINDING_CREATE] }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.policies.bindings.created.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
  }

  rpc UpdateBinding(Binding) returns (Binding) {
    option (google.api.http) = {
      put: "/policies/v1/bindings/{id=**}"
      body: "*"
    };
    option (chainguard.annotations.iam) = {
      enabled: { capabilities: [CAP_POLICIES_BINDING_UPDATE] }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.policies.bindings.updated.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
  }

  rpc ListBindings(BindingFilter) returns (BindingList) {
    option (google.api.http) = {
      get: "/policies/v1/bindings"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_POLICIES_BINDING_LIST]
        unscoped: true
      }
    };
  }

  rpc DeleteBinding(DeleteBindingRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/policies/v1/bindings/{id=**}"
    };
    option (chainguard.annotations.iam) = {
      enabled: { capabilities: [CAP_POLICIES_BINDING_DELETE] }
    };
    option (chainguard.annotations.events) = {
      type: "dev.chainguard.api.policies.bindings.deleted.v1"
      extensions: ["group"]
      audience: CUSTOMER
    };
  }
}

// The mode to use when evaluating the policy.
enum PolicyMode {
  POLICY_MODE_UNSPECIFIED = 0;
  // Disallow access to the artifact when it doesn't satisfy the applied policy.
  POLICY_MODE_ENFORCED = 1;
  // Allow access to the artifact when it doesn't satisfy the applied policy, but log the outcome.
  POLICY_MODE_DRY_RUN = 2;
}

// The type of policy.
enum PolicyType {
  POLICY_TYPE_UNSPECIFIED = 0;
  // The policy was created and managed by the system.
  POLICY_TYPE_SYSTEM = 1;
  // The policy was created and managed by your organization.
  POLICY_TYPE_CUSTOM = 2;
}

// The data type of a configurable parameter on a Policy.
enum ParameterType {
  PARAMETER_TYPE_UNSPECIFIED = 0;
  // A UTF-8 string value.
  PARAMETER_TYPE_STRING      = 1;
  // A signed 64-bit integer value.
  PARAMETER_TYPE_INTEGER     = 2;
  // A list of UTF-8 string values.
  PARAMETER_TYPE_STRING_LIST = 3;
  // A boolean value.
  PARAMETER_TYPE_BOOLEAN     = 4;
}

// ParameterSchema declares a single configurable parameter on a Policy.
// Bindings supply values for these parameters at activation time.
message ParameterSchema {
  // The parameter name. Must be non-empty and unique within a Policy.
  string name = 1;

  // The data type of the parameter value.
  ParameterType type = 2;

  // A human-readable description of what this parameter controls.
  string description = 3;

  // The default value applied when a Binding omits this parameter.
  google.protobuf.Value default = 4;

  // The inclusive lower bound for numeric parameters (PARAMETER_TYPE_INTEGER).
  google.protobuf.Value minimum = 5;

  // The inclusive upper bound for numeric parameters (PARAMETER_TYPE_INTEGER).
  google.protobuf.Value maximum = 6;

  // The set of allowed values (PARAMETER_TYPE_STRING, PARAMETER_TYPE_INTEGER).
  // Exact-match allowlist
  repeated google.protobuf.Value allowed_values = 7;

  // Whether the parameter must be supplied by the Binding.
  bool required = 8;

  // Whether the parameter is deprecated. Customers should migrate off
  // deprecated parameters; new Bindings should not set them.
  bool deprecated = 9;
}

// Policy defines a rule that can be evaluated on an image
// in a repository, giving an "allowed" or "disallowed" decision.
message Policy {
  string id = 1 [(chainguard.annotations.iam_scope) = true];

  // Human-readable name of the policy.
  // Name may be up to 128 characters in length, can consist
  // of characters [a-zA-Z0-9._-], but may not start with '.' or '-'
  string name = 2;

  // Human-readable description of the policy.
  string description = 3;

  // The type of policy (system or custom).
  // System policies are created automatically by the system and may not be modified.
  // Custom policies may be created and modified by users with the relevant IAM permissions.
  PolicyType policy_type = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The resource types this policy supports.
  // Each value is a Chainguard API resource type with a version suffix
  // (e.g. "registry.chainguard.dev/Repo@v1"). The version determines
  // which PolicyInput schema is used when evaluating the policy expression.
  // Supported resource types:
  //   - registry.chainguard.dev/Repo@v1
  repeated string supported_resource_types = 5;

  // The policy expression.
  string expression = 6;

  // When the policy was created.
  google.protobuf.Timestamp created_at = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the policy was last updated.
  google.protobuf.Timestamp updated_at = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The configurable parameter schemas declared by this policy. System
  // policies declare these; customers configure values on the bindings that
  // activate the policy.
  repeated ParameterSchema parameter_schemas = 9 [(google.api.field_behavior) = OUTPUT_ONLY];
}

message PolicyList {
  // The Policy items requested.
  repeated Policy items = 1;

  // Token for retrieving the next page of results.
  // Empty if there are no more results.
  string next_page_token = 2;

  // Total number of results matching the filter.
  // Optional, provided for UI pagination.
  int64 total_count = 3;

  // Number of results that were skipped.
  // Accumulates across paginated requests.
  int32 skipped = 4;
}

message PolicyFilter {
  // Optional UIDP-based filter for hierarchy navigation.
  chainguard.platform.common.UIDPFilter uidp = 1;

  // Maximum number of results to return per page.
  int32 page_size = 2;

  // Page token from a previous List response for pagination.
  string page_token = 3;

  // Order results by field. Format: "field [asc|desc]"
  // Default: "id asc"
  // Note: Changing order_by between pages invalidates the page token.
  string order_by = 4 [(google.api.field_behavior) = OPTIONAL];

  // Number of results to skip before returning.
  // Used for random-access pagination (jumping to arbitrary pages).
  // Can be combined with page_token to skip from cursor position.
  // Must be non-negative.
  int32 skip = 5 [(google.api.field_behavior) = OPTIONAL];

  // name is the exact name of the policy to filter by.
  string name = 6;
}

message CreatePolicyRequest {
  // The id of the policy's parent.
  string parent_id = 1 [(chainguard.annotations.iam_scope) = true];

  // The policy to create.
  Policy policy = 2;
}

message DeletePolicyRequest {
  // The id of the policy to delete.
  string id = 1 [(chainguard.annotations.iam_scope) = true];
}

// Binding associates a Policy with a resource in the hierarchy.
// The binding is a child of the resource it applies to, and its policy
// is applied to all descendants of that resource.
message Binding {
  // The id of the Binding. The policy is bound to its parent,
  // and applies to all of the parent's descendants.
  string id = 1 [(chainguard.annotations.iam_scope) = true];

  // The policy to apply
  string policy = 2;

  // PolicyMode defines how the policy is enforced.
  PolicyMode mode = 3;

  // The resource types this binding applies to.
  // Each value is a Chainguard API resource type
  // (e.g. "registry.chainguard.dev/Repo").
  // Supported resource types:
  //   - registry.chainguard.dev/Repo
  repeated string resource_types = 4;

  // The parameter values supplied for this binding, keyed by parameter name.
  // The set of valid keys and value types is declared by the referenced
  // policy's parameter_schemas. Server-side validation rejects unknown keys
  // and values that violate the schema.
  map<string, google.protobuf.Value> parameters = 5;

  // When the binding was created.
  google.protobuf.Timestamp created_at = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the binding was last updated.
  google.protobuf.Timestamp updated_at = 7 [(google.api.field_behavior) = OUTPUT_ONLY];
}

message BindingList {
  // The requested bindings.
  repeated Binding items = 1;

  // Token for retrieving the next page of results.
  // Empty if there are no more results.
  string next_page_token = 2;

  // Total number of results matching the filter.
  // Optional, provided for UI pagination.
  int64 total_count = 3;

  // Number of results that were skipped.
  // Accumulates across paginated requests.
  int32 skipped = 4;
}

message BindingFilter {
  // Optional UIDP-based filter for hierarchy navigation.
  chainguard.platform.common.UIDPFilter uidp = 1;

  // Maximum number of results to return per page.
  int32 page_size = 2;

  // Page token from a previous List response for pagination.
  string page_token = 3;

  // Order results by field. Format: "field [asc|desc]"
  // Default: "id asc"
  // Note: Changing order_by between pages invalidates the page token.
  string order_by = 4 [(google.api.field_behavior) = OPTIONAL];

  // Number of results to skip before returning.
  // Used for random-access pagination (jumping to arbitrary pages).
  // Can be combined with page_token to skip from cursor position.
  // Must be non-negative.
  int32 skip = 5 [(google.api.field_behavior) = OPTIONAL];
}

message CreateBindingRequest {
  string parent_id = 1 [(chainguard.annotations.iam_scope) = true];
  Binding binding = 2;
}

message DeleteBindingRequest {
  string id = 1 [(chainguard.annotations.iam_scope) = true];
}
