syntax = "proto3";

option go_package = "chainguard.dev/sdk/proto/platform/policygates/v1";

package chainguard.platform.policygates.v1;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "annotations/auth.proto";
import "platform/common/v1/uidp.platform.proto";

service Policies {
  rpc CreatePolicy(CreatePolicyRequest) returns (Policy) {
    option (google.api.http) = {
      post: "/policygates/v1/policies/{parent_id=**}"
      body: "policy"
    };
    option (chainguard.annotations.iam) = {
      enabled: { capabilities: [CAP_POLICY_GATES_POLICY_CREATE] }
    };
  }

  rpc UpdatePolicy(Policy) returns (Policy) {
    option (google.api.http) = {
      put: "/policygates/v1/policies/{id=**}"
      body: "*"
    };
    option (chainguard.annotations.iam) = {
      enabled: { capabilities: [CAP_POLICY_GATES_POLICY_UPDATE] }
    };
  }

  rpc ListPolicies(PolicyFilter) returns (PolicyList) {
    option (google.api.http) = {
      get: "/policygates/v1/policies"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_POLICY_GATES_POLICY_LIST]
        unscoped: true
      }
    };
  }

  rpc DeletePolicy(DeletePolicyRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/policygates/v1/policies/{id=**}"
    };
    option (chainguard.annotations.iam) = {
      enabled: { capabilities: [CAP_POLICY_GATES_POLICY_DELETE] }
    };
  }
}

service Bindings {
  rpc CreateBinding(CreateBindingRequest) returns (Binding) {
    option (google.api.http) = {
      post: "/policygates/v1/bindings/{parent_id=**}"
      body: "binding"
    };
    option (chainguard.annotations.iam) = {
      enabled: { capabilities: [CAP_POLICY_GATES_BINDING_CREATE] }
    };
  }

  rpc UpdateBinding(Binding) returns (Binding) {
    option (google.api.http) = {
      put: "/policygates/v1/bindings/{id=**}"
      body: "*"
    };
    option (chainguard.annotations.iam) = {
      enabled: { capabilities: [CAP_POLICY_GATES_BINDING_UPDATE] }
    };
  }

  rpc ListBindings(BindingFilter) returns (BindingList) {
    option (google.api.http) = {
      get: "/policygates/v1/bindings"
    };
    option (chainguard.annotations.iam) = {
      enabled: {
        capabilities: [CAP_POLICY_GATES_BINDING_LIST]
        unscoped: true
      }
    };
  }

  rpc DeleteBinding(DeleteBindingRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/policygates/v1/bindings/{id=**}"
    };
    option (chainguard.annotations.iam) = {
      enabled: { capabilities: [CAP_POLICY_GATES_BINDING_DELETE] }
    };
  }
}

// The mode to use when evaluating the policy.
enum PolicyMode {
  POLICY_MODE_UNSPECIFIED = 0;
  // Disallow access to the artifact when it doesn't satisfy the applied policy.
  POLICY_MODE_ENFORCED = 1;
  // Allow access to the artifact when it doesn't satisfy the applied policy, but log the outcome.
  POLICY_MODE_LOG = 2;
}

// The type of policy.
enum PolicyType {
  POLICY_TYPE_UNSPECIFIED = 0;
  // The policy was created and managed by the system.
  POLICY_TYPE_SYSTEM = 1;
  // The policy was created and managed by your organization.
  POLICY_TYPE_CUSTOM = 2;
}

// Policy defines a rule that can be evaluated on an image
// in a repository, giving an "allowed" or "disallowed" decision.
message Policy {
  string id = 1 [(chainguard.annotations.iam_scope) = true];

  // Human-readable name of the policy.
  // Name may be up to 128 characters in length, can consist
  // of characters [a-zA-Z0-9._-], but may not start with '.' or '-'
  string name = 2;

  // Human-readable description of the policy.
  string description = 3;

  // The type of policy (system or custom).
  // System policies are created automatically by the system and may not be modified.
  // Custom policies may be created and modified by users with the relevant IAM permissions.
  PolicyType policy_type = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The policy expression.
  string expression = 6;

  // When the policy was created.
  google.protobuf.Timestamp created_at = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the policy was last updated.
  google.protobuf.Timestamp updated_at = 8 [(google.api.field_behavior) = OUTPUT_ONLY];
}

message PolicyList {
  // The Policy items requested.
  repeated Policy items = 1;

  // Token for retrieving the next page of results.
  // Empty if there are no more results.
  string next_page_token = 2;

  // Total number of results matching the filter.
  // Optional, provided for UI pagination.
  int64 total_count = 3;

  // Number of results that were skipped.
  // Accumulates across paginated requests.
  int32 skipped = 4;
}

message PolicyFilter {
  // Optional UIDP-based filter for hierarchy navigation.
  chainguard.platform.common.UIDPFilter uidp = 1;

  // Maximum number of results to return per page.
  int32 page_size = 2;

  // Page token from a previous List response for pagination.
  string page_token = 3;

  // Order results by field. Format: "field [asc|desc]"
  // Default: "id asc"
  // Note: Changing order_by between pages invalidates the page token.
  string order_by = 4 [(google.api.field_behavior) = OPTIONAL];

  // Number of results to skip before returning.
  // Used for random-access pagination (jumping to arbitrary pages).
  // Can be combined with page_token to skip from cursor position.
  // Must be non-negative.
  int32 skip = 5 [(google.api.field_behavior) = OPTIONAL];
}

message CreatePolicyRequest {
  // The id of the policy's parent.
  string parent_id = 1 [(chainguard.annotations.iam_scope) = true];

  // The policy to create.
  Policy policy = 2;
}

message DeletePolicyRequest {
  // The id of the policy to delete.
  string id = 1 [(chainguard.annotations.iam_scope) = true];
}

// Binding associates a Policy with a resource in the hierarchy.
// The binding is a child of the resource it applies to, and its policy
// is applied to all descendants of that resource.
message Binding {
  // The id of the Binding. The policy is bound to its parent,
  // and applies to all of the parent's descendants.
  string id = 1 [(chainguard.annotations.iam_scope) = true];

  // The policy to apply
  string policy = 2;

  // PolicyMode defines how the policy is enforced.
  PolicyMode mode = 3;
}

message BindingList {
  // The requested bindings.
  repeated Binding items = 1;

  // Token for retrieving the next page of results.
  // Empty if there are no more results.
  string next_page_token = 2;

  // Total number of results matching the filter.
  // Optional, provided for UI pagination.
  int64 total_count = 3;

  // Number of results that were skipped.
  // Accumulates across paginated requests.
  int32 skipped = 4;
}

message BindingFilter {
  // Optional UIDP-based filter for hierarchy navigation.
  chainguard.platform.common.UIDPFilter uidp = 1;

  // Maximum number of results to return per page.
  int32 page_size = 2;

  // Page token from a previous List response for pagination.
  string page_token = 3;

  // Order results by field. Format: "field [asc|desc]"
  // Default: "id asc"
  // Note: Changing order_by between pages invalidates the page token.
  string order_by = 4 [(google.api.field_behavior) = OPTIONAL];

  // Number of results to skip before returning.
  // Used for random-access pagination (jumping to arbitrary pages).
  // Can be combined with page_token to skip from cursor position.
  // Must be non-negative.
  int32 skip = 5 [(google.api.field_behavior) = OPTIONAL];
}

message CreateBindingRequest {
  string parent_id = 1 [(chainguard.annotations.iam_scope) = true];
  Binding binding = 2;
}

message DeleteBindingRequest {
  string id = 1 [(chainguard.annotations.iam_scope) = true];
}
