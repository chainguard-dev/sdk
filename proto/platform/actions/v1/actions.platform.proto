syntax = "proto3";

option go_package = "chainguard.dev/sdk/proto/platform/actions/v1";

package chainguard.platform.actions;

import "google/api/annotations.proto";
import "annotations/auth.proto";

// ActionsAuthorization issues authorization decisions for callers
// running inside GitHub Actions workflows.
//
// Two attestation mechanisms are provided:
//
//  1. AuthorizeWithOIDC verifies a GitHub Actions OIDC ID token
//     directly. This is the preferred path; trust derives from
//     GitHub's OIDC signing key.
//
//  2. IssueChallenge / VerifyChallenge implement an artifact-based
//     attestation, intended for workflows that *cannot* mint an OIDC
//     token at all. The most common case is a workflow run triggered
//     by a pull request from a fork: such runs do not get the
//     `id-token: write` permission elevated to a real token, so
//     AuthorizeWithOIDC is unavailable to them. The challenge flow
//     side-steps OIDC entirely and instead uses the run's own
//     artifact storage as the trust channel.
//
//     The server mints a short-lived X.509 leaf cert bound to the
//     run; the workflow uploads the cert as an artifact named with a
//     well-known prefix; verification fetches that artifact, validates
//     the cert against the trusted KMS public keys, and confirms its
//     URI SAN matches the requested run identity. Trust derives from
//     two facts: the cert is signed by our KMS key, and the
//     artifact's presence in the named run proves it was uploaded
//     from inside that run's runner (artifact upload requires
//     ACTIONS_RUNTIME_TOKEN, a per-runner credential GitHub never
//     exposes to workflow code). The mid-run logs API does not expose
//     new content until the run completes, so logs are not used.
//
// A successful AuthorizationResponse confirms the identity is real
// and that the caller is entitled to use this service. It is not a
// downstream permission grant — services that consume the returned
// `claims` (typically repository_owner_id and repository_visibility)
// apply their own authorization on top. Failure is signaled by a
// non-OK gRPC status (typically codes.PermissionDenied with no detail;
// see the README for the privacy rationale).
service ActionsAuthorization {
  // AuthorizeWithOIDC verifies a GitHub Actions OIDC ID token. The
  // token is read from the `Authorization: Bearer <jwt>` gRPC
  // metadata header (or the equivalent HTTP header on the gateway
  // path). The request body never carries the token.
  rpc AuthorizeWithOIDC(AuthorizeWithOIDCRequest) returns (AuthorizationResponse) {
    option (google.api.http) = {
      post: "/actions/v1/authorize/oidc"
      body: "*"
    };
    option (chainguard.annotations.iam) = {
      // Caller is unauthenticated by design — the OIDC token IS the
      // credential being verified.
      disabled: {}
    };
  }

  // IssueChallenge mints a short-lived X.509 leaf cert bound to a
  // specific GitHub Actions run. The server validates the run exists
  // and is in progress by querying the GitHub API. The workflow is
  // expected to upload the returned cert as a GitHub Actions artifact
  // whose name starts with `chainguard-actions-client`, so a later
  // VerifyChallenge call can fetch and confirm origin. The server
  // keeps no state between Issue and Verify — the cert is
  // self-contained.
  rpc IssueChallenge(IssueChallengeRequest) returns (IssueChallengeResponse) {
    option (google.api.http) = {
      post: "/actions/v1/challenge/issue"
      body: "*"
    };
    option (chainguard.annotations.iam) = {
      disabled: {}
    };
  }

  // VerifyChallenge lists the named run's artifacts via the GitHub
  // API, downloads any whose name starts with
  // `chainguard-actions-client`, and accepts the first whose cert is
  // signed by a currently-trusted KMS key, is unexpired, and is bound
  // to the requested (repository, run_id, run_attempt). The request
  // does NOT carry the cert — only run identity. Replay across runs
  // is prevented because artifacts are scoped to the run they were
  // uploaded from.
  rpc VerifyChallenge(VerifyChallengeRequest) returns (AuthorizationResponse) {
    option (google.api.http) = {
      post: "/actions/v1/challenge/verify"
      body: "*"
    };
    option (chainguard.annotations.iam) = {
      disabled: {}
    };
  }

  // GetCACert returns the active signer's CA cert as PEM. External
  // verifiers consume this to validate attestation leaf certs
  // offline. For verification across a key-rotation overlap, prefer
  // GetTrustedKeys — GetCACert reflects only the *current* signing
  // key.
  rpc GetCACert(GetCACertRequest) returns (CACertResponse) {
    option (google.api.http) = {
      get: "/actions/v1/ca"
    };
    option (chainguard.annotations.iam) = {
      disabled: {}
    };
  }

  // GetTrustedKeys returns every public key the server currently
  // trusts for verification, as a list of PEM-encoded PKIX
  // `PUBLIC KEY` blocks. Includes the active signing key plus any
  // additional rotation-overlap keys configured at deploy time.
  rpc GetTrustedKeys(GetTrustedKeysRequest) returns (TrustedKeysResponse) {
    option (google.api.http) = {
      get: "/actions/v1/trusted-keys"
    };
    option (chainguard.annotations.iam) = {
      disabled: {}
    };
  }
}

// Actions is the operational API for callers running inside GitHub
// Actions workflows. Unlike ActionsAuthorization (which only issues
// trust decisions), this service hosts RPCs that workflows invoke
// against the service during a run — self-reported telemetry today,
// and likely more workflow-facing operations later.
//
// Authentication is OPTIONAL. Callers MAY present a GitHub Actions
// OIDC ID token in the `Authorization: Bearer <jwt>` header (same
// audience as ActionsAuthorization.AuthorizeWithOIDC). When a valid
// token is presented, the recorded event is marked verified and the
// token's claims (repository, run_id, run_attempt, sub, ...) are
// attached. When no token is presented, the event is still recorded
// — just marked unverified. When a token IS presented but fails to
// verify, the call is rejected.
service Actions {
  // Record registers that a GitHub repository used this service.
  // It is write-only and the recording is internal: the response is
  // empty and there is no read side.
  //
  // Behavior depends on the `Authorization: Bearer <jwt>` header:
  //   - Header absent (or non-Bearer scheme): the request body's
  //     `repository` field is REQUIRED and taken as-is; the event is
  //     recorded as unverified. Lets forked-PR workflows (which
  //     cannot mint an OIDC token) still self-identify.
  //   - Header present and verifies: the request body's `repository`
  //     field is IGNORED and the repository is taken from the
  //     verified token's claim instead; the event is recorded as
  //     verified with the token's claims attached.
  //   - Header present but fails to verify: rejected with
  //     codes.PermissionDenied. The caller claimed an identity and
  //     we won't silently downgrade that to unverified.
  //
  // Repeated calls with the same token are allowed (no replay check)
  // so a long-running workflow can record multiple events.
  rpc Record(RecordRequest) returns (RecordResponse) {
    option (google.api.http) = {
      post: "/actions/v1/record"
      body: "*"
    };
    option (chainguard.annotations.iam) = {
      // Unauthenticated by design — the OIDC token, when presented,
      // IS the credential; an absent token is also accepted but
      // produces an unverified record.
      disabled: {}
    };
  }
}

// AuthorizeWithOIDCRequest carries no token. The OIDC ID token is
// read from the `Authorization: Bearer <jwt>` gRPC metadata header.
// The set of accepted audiences is fixed by the server; the caller
// cannot influence it.
message AuthorizeWithOIDCRequest {}

// IssueChallengeRequest names the GitHub Actions run for which a
// challenge cert is being requested. The server treats these as
// claims to bind into the leaf cert's URI SAN; trust does not arrive
// until the subsequent VerifyChallenge call confirms the cert
// appeared as an artifact in that run's actual artifact listing.
message IssueChallengeRequest {
  // repository is the owner/repo slug, e.g. "chainguard-dev/mono".
  string repository = 1;
  // run_id is the workflow run ID (numeric, as a string).
  string run_id = 2;
  // run_attempt is the workflow run attempt number (numeric, as a
  // string).
  string run_attempt = 3;
}

message IssueChallengeResponse {
  // cert is a PEM-encoded X.509 leaf certificate signed by the
  // server's CA. The workflow writes this PEM into a GitHub Actions
  // artifact whose name starts with `chainguard-actions-client`. The
  // cert encodes the run identity in a URI SAN; only the server's
  // signing key can have produced it. NotAfter and the serial number
  // are encoded inside the cert — clients extract them by parsing.
  string cert = 1;
}

// VerifyChallengeRequest names the run to verify. The server lists
// the run's GitHub Actions artifacts, downloads any whose name starts
// with `chainguard-actions-client`, and looks for one whose
// certificate is signed by the server's CA and whose URI SAN matches
// this run identity. The client cannot influence which artifact is
// checked.
message VerifyChallengeRequest {
  // repository is the owner/repo slug, matching the IssueChallenge
  // call.
  string repository = 1;
  // run_id is the workflow run ID (numeric, as a string).
  string run_id = 2;
  // run_attempt is the workflow run attempt number.
  string run_attempt = 3;
}

// GetCACertRequest carries no fields. The server's CA is fixed at
// deploy time; the caller cannot select among CAs.
message GetCACertRequest {}

// CACertResponse carries the server's active signer CA cert.
message CACertResponse {
  // ca_cert is the PEM-encoded X.509 CA certificate (one
  // `CERTIFICATE` block).
  string ca_cert = 1;
}

// GetTrustedKeysRequest carries no fields.
message GetTrustedKeysRequest {}

// TrustedKeysResponse lists every public key currently trusted for
// attestation-leaf verification. During a key-rotation overlap the
// list contains both the new and the previous signing key; once the
// previous key is dropped from CHALLENGE_KMS_TRUSTED_VERSIONS on the
// next deploy, only the new key remains.
message TrustedKeysResponse {
  // public_keys is a sequence of PEM-encoded PKIX `PUBLIC KEY` blocks
  // concatenated together. Order is not significant.
  string public_keys = 1;
}

// AuthorizationResponse describes the outcome of a *successful*
// authorization check. Failure is signaled by a non-OK gRPC status
// (codes.Unauthenticated); a returned message always represents
// success and always carries claims. The body deliberately does NOT
// distinguish among failure modes — see the RPC definitions for the
// privacy rationale.
message AuthorizationResponse {
  // claims echoes the verified GitHub identity (subset of GitHub's
  // OIDC claim names). For the OIDC path, claims come from the
  // verified token. For the challenge path, claims come from the
  // WorkflowRun fetched from the GitHub API at verify time — not from
  // the IssueChallenge inputs.
  map<string, string> claims = 1;
}

// RecordRequest names the GitHub repository whose use of the service
// is being recorded. Whose value the server actually trusts depends
// on the optional OIDC bearer token:
//
//   - Verified call (valid bearer presented): the `repository` field
//     is IGNORED. The server takes the repository slug from the
//     verified token's `repository` claim instead — that value is
//     authoritative, and accepting a request-supplied one would just
//     create a way to lie.
//   - Unverified call (no bearer): the `repository` field is REQUIRED
//     and is taken as-is. The recorded event is marked unverified.
//
// There are no other caller-supplied fields — no metrics, no
// attributes, no free-form text. The recording is internal: the
// server keeps a usage record per repository (today via structured
// logging), and the response is empty.
message RecordRequest {
  // repository is the owner/repo slug, e.g. "chainguard-dev/mono".
  // Required on unverified calls; ignored on verified calls. Server-
  // enforced caps: non-empty, ≤256 bytes, must contain a single "/"
  // separating non-empty owner and repo segments.
  string repository = 1;
}

// RecordResponse is empty on success. Failure is signaled by a
// non-OK gRPC status.
message RecordResponse {}
